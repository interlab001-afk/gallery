<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✅ 할일</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0f0f1a; color:#e2e8f0; font-family:'Segoe UI',sans-serif; min-height:100vh; }
.navbar { display:flex; flex-wrap:wrap; gap:6px; padding:10px 16px; background:#1e1b4b; border-bottom:1px solid #3730a3; position:sticky; top:0; z-index:100; }
.navbar a { padding:6px 12px; border-radius:20px; text-decoration:none; font-size:0.8rem; font-weight:600; transition:all 0.2s; }
.nav-home   { background:#1a1a2e; border:1px solid #6366f1; color:#a5b4fc; }
.nav-gallery{ background:#1a1a2e; border:1px solid #8b5cf6; color:#c4b5fd; }
.nav-gen    { background:#1a1a2e; border:1px solid #ec4899; color:#f9a8d4; }
.nav-links  { background:#1a1a2e; border:1px solid #3b82f6; color:#93c5fd; }
.nav-ideas  { background:#1a1a2e; border:1px solid #fbbf24; color:#fbbf24; }
.nav-todos  { background:#1a1a2e; border:1px solid #ef4444; color:#fca5a5; }
.nav-memo   { background:#1a1a2e; border:1px solid #10b981; color:#6ee7b7; }
.navbar a:hover { opacity:0.8; transform:translateY(-1px); }
.header { background:linear-gradient(135deg,#450a0a,#991b1b); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:1.3rem; font-weight:700; color:#fca5a5; }
.progress-section { margin:16px; background:#1e1b4b; border:1px solid #2d2b5a; border-radius:12px; padding:14px; }
.progress-label { display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem; color:#9ca3af; }
.progress-bar { background:#12122a; border-radius:10px; height:10px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#ef4444,#10b981); border-radius:10px; transition:width 0.5s; }
.form-card { background:#1e1b4b; border:1px solid #2d2b5a; border-radius:12px; padding:16px; margin:0 16px 16px; }
.form-card h3 { font-size:0.95rem; color:#fca5a5; margin-bottom:12px; font-weight:700; }
.form-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.form-row input, .form-row select {
  background:#12122a; border:1px solid #374151; color:#e2e8f0;
  padding:9px 12px; border-radius:8px; font-size:0.85rem; font-family:inherit;
}
.form-row input { flex:1; min-width:160px; }
.form-row select { min-width:130px; }
.form-row input:focus, .form-row select:focus { outline:none; border-color:#ef4444; }
.form-row input[type=datetime-local]::-webkit-calendar-picker-indicator { filter:invert(1); }
.btn { padding:9px 18px; border:none; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-primary { background:linear-gradient(135deg,#991b1b,#ef4444); color:white; }
.btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
.btn-cancel { background:#374151; color:#e2e8f0; }
.btn-notify { background:linear-gradient(135deg,#1d4ed8,#3b82f6); color:white; width:100%; margin-top:8px; }
.btn-notify:hover { opacity:0.9; }
.notify-status { font-size:0.78rem; margin-top:8px; padding:6px 10px; border-radius:6px; text-align:center; }
.notify-on  { background:#052e16; color:#4ade80; border:1px solid #166534; }
.notify-off { background:#450a0a; color:#fca5a5; border:1px solid #991b1b; }
.alarm-options { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.alarm-check { display:flex; align-items:center; gap:5px; font-size:0.8rem; color:#9ca3af; cursor:pointer; }
.alarm-check input { accent-color:#ef4444; }
.repeat-check { display:flex; align-items:center; gap:5px; font-size:0.8rem; color:#fbbf24; cursor:pointer; margin-top:6px; }
.repeat-check input { accent-color:#fbbf24; }
.filter-section { padding:0 16px 12px; display:flex; gap:8px; flex-wrap:wrap; }
.filter-btn { padding:6px 14px; border-radius:20px; border:1px solid #374151; background:#1e1b4b; color:#9ca3af; font-size:0.8rem; cursor:pointer; transition:all 0.2s; font-weight:600; }
.filter-btn.active { background:#991b1b; border-color:#ef4444; color:white; }
.todos-list { padding:0 16px 24px; display:flex; flex-direction:column; gap:8px; }
.todo-item { background:#1e1b4b; border:1px solid #2d2b5a; border-radius:10px; padding:12px 14px; display:flex; align-items:flex-start; gap:10px; transition:all 0.2s; }
.todo-item:hover { border-color:#ef4444; }
.todo-item.done { opacity:0.6; }
.todo-item.alarm-soon { border-color:#fbbf24!important; box-shadow:0 0 8px #fbbf2440; }
.todo-checkbox { width:20px; height:20px; border-radius:50%; border:2px solid #ef4444; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; margin-top:2px; }
.todo-checkbox.checked { background:#10b981; border-color:#10b981; }
.todo-content { flex:1; min-width:0; }
.todo-title { font-size:0.9rem; font-weight:600; color:#e2e8f0; margin-bottom:4px; }
.todo-item.done .todo-title { text-decoration:line-through; color:#6b7280; }
.todo-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.todo-tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; background:#450a0a; color:#fca5a5; border:1px solid #991b1b; }
.todo-date { color:#6b7280; font-size:0.72rem; }
.todo-alarm { color:#fbbf24; font-size:0.72rem; display:flex; align-items:center; gap:3px; }
.todo-repeat { color:#a78bfa; font-size:0.7rem; }
.todo-actions { display:flex; flex-direction:column; gap:4px; flex-shrink:0; }
.todo-edit { background:none; border:1px solid #3b82f6; color:#93c5fd; cursor:pointer; font-size:0.72rem; padding:4px 8px; border-radius:6px; transition:all 0.2s; font-weight:600; }
.todo-edit:hover { background:#1e3a5f; }
.todo-del { background:none; border:none; color:#6b7280; cursor:pointer; font-size:1rem; padding:4px; border-radius:4px; transition:color 0.2s; }
.todo-del:hover { color:#ef4444; }
.empty-state { text-align:center; padding:60px 20px; color:#6b7280; }
.empty-state .icon { font-size:3rem; margin-bottom:12px; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#991b1b; color:white; padding:12px 24px; border-radius:24px; font-size:0.9rem; font-weight:600; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }

/* 수정 모달 */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:#1e1b4b; border:1px solid #ef4444; border-radius:16px; padding:24px; width:90%; max-width:520px; max-height:90vh; overflow-y:auto; }
.modal h3 { color:#fca5a5; font-size:1rem; margin-bottom:16px; font-weight:700; }
.modal input, .modal select { width:100%; background:#12122a; border:1px solid #374151; color:#e2e8f0; padding:9px 12px; border-radius:8px; font-size:0.85rem; font-family:inherit; margin-bottom:10px; }
.modal input[type=datetime-local]::-webkit-calendar-picker-indicator { filter:invert(1); }
.modal input:focus, .modal select:focus { outline:none; border-color:#ef4444; }
.modal-alarm { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
.modal-alarm label { display:flex; align-items:center; gap:5px; font-size:0.82rem; color:#9ca3af; cursor:pointer; }
.modal-alarm input { accent-color:#ef4444; width:auto; margin-bottom:0; }
.modal-repeat { display:flex; align-items:center; gap:6px; font-size:0.82rem; color:#fbbf24; margin-bottom:14px; cursor:pointer; }
.modal-repeat input { accent-color:#fbbf24; width:auto; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; }
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-home">🏠 홈</a>
  <a href="gall.html" class="nav-gallery">🖼️ 갤러리</a>
  <a href="prompt-generator.html" class="nav-gen">✨ 생성기</a>
  <a href="links.html" class="nav-links">🔗 링크</a>
  <a href="ideas.html" class="nav-ideas">💡 아이디어</a>
  <a href="todos.html" class="nav-todos">✅ 할일</a>
  <a href="memo.html" class="nav-memo">📝 메모</a>
</nav>

<div class="header">
  <h1>✅ 할일 목록</h1>
  <span style="color:#fca5a5;font-size:0.85rem;" id="todoCountLabel">0/0</span>
</div>

<div class="progress-section">
  <div class="progress-label">
    <span>진행률</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="form-card">
  <h3>➕ 할일 추가</h3>
  <div class="form-row">
    <input type="text" id="todoInput" placeholder="할일을 입력하세요..." onkeydown="if(event.key==='Enter')addTodo()">
    <select id="todoCategory">
      <option value="work">💼 업무</option>
      <option value="ai">🤖 AI 작업</option>
      <option value="study">📚 공부</option>
      <option value="personal">🌟 개인</option>
      <option value="birthday">🎂 생일</option>
      <option value="other">📌 기타</option>
    </select>
  </div>
  <div class="form-row">
    <input type="datetime-local" id="todoDue" placeholder="날짜/시간">
    <button class="btn btn-primary" onclick="addTodo()">➕ 추가</button>
  </div>
  <div class="alarm-options">
    <label class="alarm-check"><input type="checkbox" id="alarm7d"> 🔔 1주일 전</label>
    <label class="alarm-check"><input type="checkbox" id="alarm1d" checked> 🔔 하루 전</label>
    <label class="alarm-check"><input type="checkbox" id="alarm0d" checked> 🔔 당일 아침 9시</label>
  </div>
  <label class="repeat-check"><input type="checkbox" id="alarmRepeat"> 🔁 매년 반복 (생일용)</label>
  <button class="btn btn-notify" onclick="requestNotify()">🔔 브라우저 알림 허용</button>
  <div class="notify-status notify-off" id="notifyStatus">알림 상태 확인 중...</div>
</div>

<div class="filter-section">
  <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="setFilter('todo',this)">⏳ 미완료</button>
  <button class="filter-btn" onclick="setFilter('done',this)">✅ 완료</button>
  <button class="filter-btn" onclick="setFilter('alarm',this)">🔔 알림있는것</button>
</div>

<div class="todos-list" id="todosList"></div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ 할일 수정</h3>
    <input type="text" id="editText" placeholder="할일 내용">
    <select id="editCategory">
      <option value="work">💼 업무</option>
      <option value="ai">🤖 AI 작업</option>
      <option value="study">📚 공부</option>
      <option value="personal">🌟 개인</option>
      <option value="birthday">🎂 생일</option>
      <option value="other">📌 기타</option>
    </select>
    <input type="datetime-local" id="editDue">
    <div class="modal-alarm">
      <label><input type="checkbox" id="editAlarm7d"> 🔔 1주일 전</label>
      <label><input type="checkbox" id="editAlarm1d"> 🔔 하루 전</label>
      <label><input type="checkbox" id="editAlarm0d"> 🔔 당일 아침 9시</label>
    </div>
    <label class="modal-repeat"><input type="checkbox" id="editRepeat"> 🔁 매년 반복 (생일용)</label>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBAHHRv_CWzDXJ2aHrG5uTysDZ7JcfewEk",
  authDomain: "claude-grok-gallery.firebaseapp.com",
  projectId: "claude-grok-gallery",
  storageBucket: "claude-grok-gallery.firebasestorage.app",
  messagingSenderId: "907968891772",
  appId: "1:907968891772:web:50d9f0f9839d949e59b2f9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let items = [];
let currentFilter = 'all';
let editingId = null;

const CAT_LABELS = {
  work:'💼 업무', ai:'🤖 AI 작업', study:'📚 공부',
  personal:'🌟 개인', birthday:'🎂 생일', other:'📌 기타'
};

/* ===== 알림 권한 ===== */
window.requestNotify = async function() {
  if (!('Notification' in window)) { showToast('❌ 이 브라우저는 알림 미지원'); return; }
  const perm = await Notification.requestPermission();
  updateNotifyStatus();
  if (perm === 'granted') showToast('✅ 알림 허용됨!');
  else showToast('❌ 알림 거부됨');
};

function updateNotifyStatus() {
  const el = document.getElementById('notifyStatus');
  if (!('Notification' in window)) {
    el.textContent = '❌ 이 브라우저는 알림 미지원';
    el.className = 'notify-status notify-off'; return;
  }
  if (Notification.permission === 'granted') {
    el.textContent = '✅ 알림 허용됨 — 예약 알림 작동 중';
    el.className = 'notify-status notify-on';
  } else if (Notification.permission === 'denied') {
    el.textContent = '❌ 알림 차단됨 — 브라우저 설정에서 허용해주세요';
    el.className = 'notify-status notify-off';
  } else {
    el.textContent = '⚠️ 알림 미허용 — 위 버튼을 눌러 허용해주세요';
    el.className = 'notify-status notify-off';
  }
}
updateNotifyStatus();

function sendNotification(title, body) {
  if (Notification.permission !== 'granted') return;
  new Notification(title, { body, icon:'https://interlab001-afk.github.io/favicon.ico' });
}

function checkAlarms() {
  if (Notification.permission !== 'granted') return;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  items.forEach(it => {
    if (it.done || !it.due) return;
    let dueDate = new Date(it.due);
    if (it.repeat) {
      dueDate = new Date(now.getFullYear(), dueDate.getMonth(), dueDate.getDate(), 9, 0, 0);
      if (dueDate < today) dueDate.setFullYear(dueDate.getFullYear() + 1);
    }
    const diff = dueDate - now;
    const diffDays = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hh = now.getHours(), mm = now.getMinutes();
    if (it.alarm7d && diffDays === 7 && hh === 9 && mm === 0) sendNotification('🔔 1주일 후 일정!', `📌 ${it.text} — 7일 후`);
    if (it.alarm1d && diffDays === 1 && hh === 9 && mm === 0) sendNotification('🔔 내일 일정!', `📌 ${it.text} — 내일`);
    if (it.alarm0d && diffDays === 0 && hh === 9 && mm === 0) sendNotification('🔔 오늘 일정!', `📌 ${it.text} — 오늘`);
    if (Math.abs(diff) < 60000 && diff > 0) sendNotification('⏰ 지금 일정!', `📌 ${it.text}`);
  });
}
setInterval(checkAlarms, 60000);
checkAlarms();

/* ===== 데이터 로드 ===== */
async function loadTodos() {
  try {
    const q = query(collection(db,'todos'), orderBy('date','desc'));
    const snap = await getDocs(q);
    items = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderTodos();
  } catch(e) { showToast('❌ 로드 실패'); }
}

/* ===== 할일 추가 ===== */
window.addTodo = async function() {
  const text    = document.getElementById('todoInput').value.trim();
  const cat     = document.getElementById('todoCategory').value;
  const due     = document.getElementById('todoDue').value;
  const alarm7d = document.getElementById('alarm7d').checked;
  const alarm1d = document.getElementById('alarm1d').checked;
  const alarm0d = document.getElementById('alarm0d').checked;
  const repeat  = document.getElementById('alarmRepeat').checked;
  if (!text) { showToast('⚠️ 할일을 입력하세요'); return; }
  try {
    await addDoc(collection(db,'todos'), {
      text, cat, done:false,
      due: due || null,
      alarm7d, alarm1d, alarm0d, repeat,
      date: new Date().toISOString()
    });
    document.getElementById('todoInput').value = '';
    document.getElementById('todoDue').value   = '';
    await loadTodos();
    showToast('✅ 할일 추가됨!');
  } catch(e) { showToast('❌ 저장 실패: ' + e.message); }
};

/* ===== 필터 ===== */
window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTodos();
};

/* ===== D-day ===== */
function getDday(due, repeat) {
  if (!due) return null;
  const now = new Date();
  let d = new Date(due);
  if (repeat) {
    d = new Date(now.getFullYear(), d.getMonth(), d.getDate());
    if (d < new Date(now.getFullYear(), now.getMonth(), now.getDate())) d.setFullYear(d.getFullYear() + 1);
  }
  const diff = Math.ceil((d - now) / (1000 * 60 * 60 * 24));
  if (diff < 0) return `D+${Math.abs(diff)}`;
  if (diff === 0) return 'D-Day!';
  return `D-${diff}`;
}

/* ===== 렌더링 ===== */
window.renderTodos = function() {
  const total     = items.length;
  const doneCount = items.filter(i => i.done).length;
  const pct       = total ? Math.round((doneCount/total)*100) : 0;
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('todoCountLabel').textContent = doneCount + '/' + total;

  let filtered = items.filter(it => {
    if (currentFilter === 'todo')  return !it.done;
    if (currentFilter === 'done')  return it.done;
    if (currentFilter === 'alarm') return it.due;
    return true;
  });

  const list = document.getElementById('todosList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>할일이 없어요!</p></div>';
    return;
  }

  const now = new Date();
  list.innerHTML = filtered.map(it => {
    const dday   = getDday(it.due, it.repeat);
    const isSoon = it.due && !it.done && (new Date(it.due) - now) < 86400000 * 2;
    const alarmIcons = [
      it.alarm7d ? '🔔1주전' : '',
      it.alarm1d ? '🔔하루전' : '',
      it.alarm0d ? '🔔당일' : ''
    ].filter(Boolean).join(' ');

    return `
    <div class="todo-item${it.done?' done':''}${isSoon?' alarm-soon':''}" data-id="${it.id}">
      <div class="todo-checkbox${it.done?' checked':''}" onclick="toggleDone('${it.id}',${it.done})">
        ${it.done ? '✓' : ''}
      </div>
      <div class="todo-content">
        <div class="todo-title">${escapeHtml(it.text)}</div>
        <div class="todo-meta">
          <span class="todo-tag">${CAT_LABELS[it.cat]||it.cat}</span>
          <span class="todo-date">${it.date ? new Date(it.date).toLocaleDateString('ko') : ''}</span>
          ${it.due ? `<span class="todo-alarm">⏰ ${new Date(it.due).toLocaleString('ko',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})} <strong>${dday||''}</strong></span>` : ''}
          ${it.repeat ? `<span class="todo-repeat">🔁 매년반복</span>` : ''}
          ${alarmIcons ? `<span style="font-size:0.68rem;color:#9ca3af">${alarmIcons}</span>` : ''}
        </div>
      </div>
      <div class="todo-actions">
        <button class="todo-edit" onclick="openEditModal('${it.id}')">✏️ 수정</button>
        <button class="todo-del"  onclick="deleteTodo('${it.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
};

/* ===== 완료 토글 ===== */
window.toggleDone = async function(id, done) {
  try {
    await updateDoc(doc(db,'todos',id), { done:!done });
    await loadTodos();
    showToast(done ? '⏳ 미완료로 변경' : '✅ 완료!');
  } catch(e) { showToast('❌ 오류'); }
};

/* ===== 수정 모달 열기 ===== */
window.openEditModal = function(id) {
  const it = items.find(x => x.id === id);
  if (!it) return;
  editingId = id;
  document.getElementById('editText').value      = it.text;
  document.getElementById('editCategory').value  = it.cat || 'work';
  document.getElementById('editDue').value       = it.due
    ? new Date(it.due).toISOString().slice(0,16) : '';
  document.getElementById('editAlarm7d').checked = !!it.alarm7d;
  document.getElementById('editAlarm1d').checked = !!it.alarm1d;
  document.getElementById('editAlarm0d').checked = !!it.alarm0d;
  document.getElementById('editRepeat').checked  = !!it.repeat;
  document.getElementById('editModal').classList.add('show');
};

window.closeEditModal = function() {
  editingId = null;
  document.getElementById('editModal').classList.remove('show');
};

/* ===== 수정 저장 ===== */
window.saveEdit = async function() {
  if (!editingId) return;
  const text    = document.getElementById('editText').value.trim();
  const cat     = document.getElementById('editCategory').value;
  const due     = document.getElementById('editDue').value;
  const alarm7d = document.getElementById('editAlarm7d').checked;
  const alarm1d = document.getElementById('editAlarm1d').checked;
  const alarm0d = document.getElementById('editAlarm0d').checked;
  const repeat  = document.getElementById('editRepeat').checked;
  if (!text) { showToast('⚠️ 내용을 입력하세요'); return; }
  try {
    await updateDoc(doc(db,'todos',editingId), {
      text, cat,
      due: due || null,
      alarm7d, alarm1d, alarm0d, repeat
    });
    closeEditModal();
    await loadTodos();
    showToast('✅ 수정 완료!');
  } catch(e) { showToast('❌ 수정 실패: ' + e.message); }
};

/* ===== 삭제 ===== */
window.deleteTodo = async function(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db,'todos',id));
    await loadTodos();
    showToast('🗑️ 삭제됨!');
  } catch(e) { showToast('❌ 삭제 실패'); }
};

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});

loadTodos();
</script>
</body>
</html>

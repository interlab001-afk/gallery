<html lang="ko">
<head>

<title>✅ 할일</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0f0f1a; color:#e2e8f0; font-family:'Segoe UI',sans-serif; min-height:100vh; }
.navbar { display:flex; flex-wrap:wrap; gap:6px; padding:10px 16px; background:#1e1b4b; border-bottom:1px solid #3730a3; position:sticky; top:0; z-index:100; }
.navbar a { padding:6px 12px; border-radius:20px; text-decoration:none; font-size:0.8rem; font-weight:600; transition:all 0.2s; }
.nav-home   { background:#1a1a2e; border:1px solid #6366f1; color:#a5b4fc; }
.nav-gallery{ background:#1a1a2e; border:1px solid #8b5cf6; color:#c4b5fd; }
.nav-gen    { background:#1a1a2e; border:1px solid #ec4899; color:#f9a8d4; }
.nav-links  { background:#1a1a2e; border:1px solid #3b82f6; color:#93c5fd; }
.nav-ideas  { background:#1a1a2e; border:1px solid #fbbf24; color:#fbbf24; }
.nav-todos  { background:#3b0d0d; border:1px solid #ef4444; color:#fca5a5; }
.nav-memo   { background:#1a1a2e; border:1px solid #10b981; color:#6ee7b7; }
.navbar a:hover { opacity:0.8; transform:translateY(-1px); }
.header { background:linear-gradient(135deg,#450a0a,#991b1b); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.header h1 { font-size:1.2rem; font-weight:700; color:#fca5a5; }
.count-banner { display:flex; align-items:stretch; margin:12px 16px; background:#12122a; border:1px solid #2d2b5a; border-radius:12px; overflow:hidden; }
.count-side { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:12px 8px; gap:3px; }
.count-side.todo-side { border-right:1px solid #2d2b5a; }
.count-label { font-size:0.72rem; font-weight:600; color:#9ca3af; }
.count-num { font-size:1.7rem; font-weight:800; line-height:1.1; }
.todo-side .count-num { color:#ef4444; }
.done-side .count-num { color:#10b981; }
.count-center { display:flex; align-items:center; padding:0 12px; color:#374151; font-size:1.4rem; font-weight:700; }
.progress-section { margin:0 16px 12px; background:#1e1b4b; border:1px solid #2d2b5a; border-radius:10px; padding:10px 14px; }
.progress-label { display:flex; justify-content:space-between; margin-bottom:6px; font-size:0.8rem; color:#9ca3af; }
.progress-bar { background:#12122a; border-radius:10px; height:8px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#ef4444,#10b981); border-radius:10px; transition:width 0.5s; }
.form-card { background:#1e1b4b; border:1px solid #2d2b5a; border-radius:12px; padding:14px; margin:0 16px 12px; }
.form-card h3 { font-size:0.9rem; color:#fca5a5; margin-bottom:10px; font-weight:700; }
.form-row { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.form-row input, .form-row select { background:#12122a; border:1px solid #374151; color:#e2e8f0; padding:8px 10px; border-radius:8px; font-size:0.82rem; font-family:inherit; }
.form-row input { flex:1; min-width:140px; }
.form-row select { min-width:120px; }
.form-row input:focus, .form-row select:focus { outline:none; border-color:#ef4444; }
.form-row input[type=datetime-local]::-webkit-calendar-picker-indicator { filter:invert(1); }
.btn { padding:8px 16px; border:none; border-radius:8px; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-primary { background:linear-gradient(135deg,#991b1b,#ef4444); color:white; }
.btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
.btn-success { background:linear-gradient(135deg,#065f46,#10b981); color:white; }
.btn-success:hover { opacity:0.9; }
.btn-cancel { background:#374151; color:#e2e8f0; }
.btn-notify { background:linear-gradient(135deg,#1d4ed8,#3b82f6); color:white; width:100%; margin-top:6px; }
.notify-status { font-size:0.75rem; margin-top:6px; padding:5px 10px; border-radius:6px; text-align:center; }
.notify-on  { background:#052e16; color:#4ade80; border:1px solid #166534; }
.notify-off { background:#450a0a; color:#fca5a5; border:1px solid #991b1b; }
.alarm-options { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
.alarm-check { display:flex; align-items:center; gap:4px; font-size:0.78rem; color:#9ca3af; cursor:pointer; }
.alarm-check input { accent-color:#ef4444; }
.repeat-check { display:flex; align-items:center; gap:4px; font-size:0.78rem; color:#fbbf24; cursor:pointer; margin-top:5px; }
.repeat-check input { accent-color:#fbbf24; }
.filter-section { padding:0 16px 10px; display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.filter-btn { padding:5px 12px; border-radius:20px; border:1px solid #374151; background:#1e1b4b; color:#9ca3af; font-size:0.78rem; cursor:pointer; transition:all 0.2s; font-weight:600; }
.filter-btn.active { background:#991b1b; border-color:#ef4444; color:white; }
.search-input { flex:1; min-width:120px; background:#12122a; border:1px solid #374151; color:#e2e8f0; padding:5px 12px; border-radius:20px; font-size:0.78rem; outline:none; }
.search-input:focus { border-color:#ef4444; }
.board-container { display:grid; grid-template-columns:1fr 1fr; gap:0 10px; padding:0 12px 4px; }
.board-col-header { display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:8px 8px 0 0; font-size:0.82rem; font-weight:700; margin-bottom:3px; }
.col-todo .board-col-header { background:linear-gradient(135deg,#450a0a,#7f1d1d); color:#fca5a5; border:1px solid #991b1b; border-bottom:none; }
.col-done .board-col-header { background:linear-gradient(135deg,#052e16,#065f46); color:#6ee7b7; border:1px solid #10b981; border-bottom:none; }
.col-badge { background:rgba(0,0,0,0.35); padding:1px 7px; border-radius:10px; font-size:0.72rem; }
.cards-col { display:flex; flex-direction:column; gap:4px; min-height:60px; }
.mini-card { background:#1a1838; border:1px solid #252347; border-radius:7px; padding:7px 9px; cursor:pointer; transition:all 0.15s; }
.mini-card:hover { transform:translateY(-1px); }
.col-todo .mini-card:hover { border-color:#ef4444; box-shadow:0 3px 10px rgba(239,68,68,0.18); }
.col-done .mini-card:hover { border-color:#10b981; box-shadow:0 3px 10px rgba(16,185,129,0.18); }
.mini-card.alarm-soon { border-color:#fbbf24 !important; box-shadow:0 0 5px #fbbf2430; }
.mini-card.done-card { border-left:3px solid #10b981; opacity:0.82; }
.mini-card.todo-card { border-left:3px solid #ef4444; }
.mini-title { font-size:0.8rem; font-weight:600; color:#e2e8f0; margin-bottom:5px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.35; }
.mini-card.done-card .mini-title { text-decoration:line-through; color:#6b7280; }
.mini-date-row { display:flex; align-items:center; gap:4px; margin-bottom:4px; flex-wrap:wrap; }
.mini-due { font-size:0.67rem; color:#93c5fd; background:#0c1a33; padding:1px 6px; border-radius:6px; border:1px solid #1e3a5f; }
.mini-reg { font-size:0.65rem; color:#4b5563; }
.mini-footer { display:flex; align-items:center; justify-content:space-between; gap:4px; flex-wrap:wrap; }
.mini-tag { display:inline-block; padding:1px 6px; border-radius:6px; font-size:0.63rem; font-weight:600; }
.todo-tag-color { background:#450a0a; color:#fca5a5; border:1px solid #991b1b; }
.done-tag-color { background:#052e16; color:#6ee7b7; border:1px solid #10b981; }
.mini-dday { font-size:0.68rem; font-weight:700; }
.dday-hot  { color:#ef4444; }
.dday-warn { color:#fbbf24; }
.dday-ok   { color:#6ee7b7; }
.dday-past { color:#4b5563; }
.mini-icons { font-size:0.65rem; color:#6b7280; }
.empty-col { text-align:center; padding:24px 10px; color:#4b5563; font-size:0.78rem; }
.empty-col .icon { font-size:1.8rem; margin-bottom:6px; }
.pagination-row { display:grid; grid-template-columns:1fr 1fr; gap:0 10px; padding:6px 12px 24px; }
.pagination { display:flex; flex-wrap:wrap; gap:3px; justify-content:center; padding:4px 0; }
.pg-btn { min-width:26px; height:26px; padding:0 6px; border:1px solid #2d2b5a; background:#12122a; color:#9ca3af; font-size:0.72rem; font-weight:600; border-radius:6px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
.pg-btn:hover { border-color:#6b7280; color:#e2e8f0; }
.pg-btn.active-todo { background:#7f1d1d; border-color:#ef4444; color:#fca5a5; }
.pg-btn.active-done { background:#065f46; border-color:#10b981; color:#6ee7b7; }
.pg-btn:disabled { opacity:0.3; cursor:default; }
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.78); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:#1e1b4b; border:1px solid #374151; border-radius:16px; padding:22px; width:92%; max-width:480px; max-height:90vh; overflow-y:auto; }
.modal-detail-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; gap:10px; }
.modal-detail-title { font-size:1rem; font-weight:700; color:#e2e8f0; flex:1; line-height:1.45; }
.modal-close-btn { background:none; border:none; color:#6b7280; font-size:1.2rem; cursor:pointer; padding:0 4px; }
.modal-close-btn:hover { color:#e2e8f0; }
.detail-row { display:flex; gap:8px; align-items:center; margin-bottom:9px; font-size:0.83rem; flex-wrap:wrap; }
.detail-label { color:#6b7280; min-width:68px; font-size:0.76rem; }
.detail-value { color:#e2e8f0; font-weight:500; }
.detail-dday { font-weight:700; font-size:0.88rem; }
.detail-divider { border:none; border-top:1px solid #2d2b5a; margin:12px 0; }
.detail-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; margin-top:14px; }
.detail-toggle-btn { flex:1; min-width:120px; }
.edit-modal { border-color:#ef4444; }
.modal h3 { color:#fca5a5; font-size:0.95rem; margin-bottom:14px; font-weight:700; }
.modal input, .modal select { width:100%; background:#12122a; border:1px solid #374151; color:#e2e8f0; padding:8px 12px; border-radius:8px; font-size:0.83rem; font-family:inherit; margin-bottom:9px; }
.modal input[type=datetime-local]::-webkit-calendar-picker-indicator { filter:invert(1); }
.modal input:focus, .modal select:focus { outline:none; border-color:#ef4444; }
.modal-alarm { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:9px; }
.modal-alarm label { display:flex; align-items:center; gap:5px; font-size:0.8rem; color:#9ca3af; cursor:pointer; }
.modal-alarm input { accent-color:#ef4444; width:auto; margin-bottom:0; }
.modal-repeat { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:#fbbf24; margin-bottom:12px; cursor:pointer; }
.modal-repeat input { accent-color:#fbbf24; width:auto; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#991b1b; color:white; padding:10px 22px; border-radius:22px; font-size:0.87rem; font-weight:600; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }
@media(max-width:400px){
  .board-container,.pagination-row { padding:0 8px 4px; gap:0 6px; }
  .mini-title { font-size:0.75rem; }
  .board-col-header { font-size:0.75rem; padding:7px 8px; }
  .mini-card { padding:6px 7px; }
  .count-num { font-size:1.3rem; }
}
</style>

<div class="header">
  <h1>✅ 할일 목록</h1>
  <span style="color:#fca5a5;font-size:0.82rem;" id="todoCountLabel">0/0</span>
</div>

<div class="count-banner">
  <div class="count-side todo-side">
    <span class="count-label">⏳ 할일</span>
    <span class="count-num" id="bannerTodo">0</span>
  </div>
  <div class="count-center">:</div>
  <div class="count-side done-side">
    <span class="count-label">✅ 한일</span>
    <span class="count-num" id="bannerDone">0</span>
  </div>
</div>

<div class="progress-section">
  <div class="progress-label"><span>진행률</span><span id="progressPct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="form-card">
  <h3>➕ 할일 추가</h3>
  <div class="form-row">
    <input type="text" id="todoInput" placeholder="할일을 입력하세요..." onkeydown="if(event.key==='Enter')addTodo()">
    <select id="todoCategory">
      <option value="work">💼 업무</option>
      <option value="ai">🤖 AI 작업</option>
      <option value="study">📚 공부</option>
      <option value="personal">🌟 개인</option>
      <option value="birthday">🎂 생일</option>
      <option value="other">📌 기타</option>
    </select>
  </div>
  <div class="form-row">
    <input type="datetime-local" id="todoDue">
    <button class="btn btn-primary" onclick="addTodo()">➕ 추가</button>
  </div>
  <div class="alarm-options">
    <label class="alarm-check"><input type="checkbox" id="alarm7d"> 🔔 1주일 전</label>
    <label class="alarm-check"><input type="checkbox" id="alarm1d" checked> 🔔 하루 전</label>
    <label class="alarm-check"><input type="checkbox" id="alarm0d" checked> 🔔 당일 아침 9시</label>
  </div>
  <label class="repeat-check"><input type="checkbox" id="alarmRepeat"> 🔁 매년 반복 (생일용)</label>
  <button class="btn btn-notify" onclick="requestNotify()">🔔 브라우저 알림 허용</button>
  <div class="notify-status notify-off" id="notifyStatus">알림 상태 확인 중...</div>
</div>

<div class="filter-section">
  <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="setFilter('todo',this)">⏳ 미완료</button>
  <button class="filter-btn" onclick="setFilter('done',this)">✅ 완료</button>
  <button class="filter-btn" onclick="setFilter('alarm',this)">🔔 알림</button>
  <input class="search-input" id="searchInput" placeholder="🔍 검색..." oninput="renderTodos()">
</div>

<div class="board-container">
  <div class="col-todo">
    <div class="board-col-header">⏳ 할일 <span class="col-badge" id="todoColCount">0</span></div>
    <div class="cards-col" id="todoCol"></div>
  </div>
  <div class="col-done">
    <div class="board-col-header">✅ 한일 <span class="col-badge" id="doneColCount">0</span></div>
    <div class="cards-col" id="doneCol"></div>
  </div>
</div>

<div class="pagination-row">
  <div class="pagination" id="todoPagination"></div>
  <div class="pagination" id="donePagination"></div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-detail-header">
      <div class="modal-detail-title" id="detailTitle"></div>
      <button class="modal-close-btn" onclick="closeDetailModal()">✕</button>
    </div>
    <hr class="detail-divider">
    <div class="detail-row"><span class="detail-label">카테고리</span><span class="detail-value" id="detailCat"></span></div>
    <div class="detail-row" id="detailDueRow"><span class="detail-label">마감일</span><span class="detail-value" id="detailDue"></span><span class="detail-dday" id="detailDday"></span></div>
    <div class="detail-row" id="detailAlarmRow"><span class="detail-label">알림</span><span class="detail-value" id="detailAlarm"></span></div>
    <div class="detail-row" id="detailRepeatRow"><span class="detail-label">반복</span><span class="detail-value" style="color:#a78bfa;">🔁 매년 반복</span></div>
    <div class="detail-row"><span class="detail-label">등록일</span><span class="detail-value" id="detailDate"></span></div>
    <div class="detail-row"><span class="detail-label">상태</span><span class="detail-value" id="detailStatus"></span></div>
    <hr class="detail-divider">
    <div class="detail-actions">
      <button class="btn btn-success detail-toggle-btn" id="detailToggleBtn" onclick="toggleFromDetail()"></button>
      <button class="btn btn-cancel" onclick="openEditFromDetail()">✏️ 수정</button>
      <button class="btn btn-primary" onclick="deleteFromDetail()">🗑️ 삭제</button>
    </div>

</div>

<!-- 수정 모달 -->

  <div class="modal edit-modal">
    <h3>✏️ 할일 수정</h3>
    <input type="text" id="editText" placeholder="할일 내용">
    <select id="editCategory">
      <option value="work">💼 업무</option>
      <option value="ai">🤖 AI 작업</option>
      <option value="study">📚 공부</option>
      <option value="personal">🌟 개인</option>
      <option value="birthday">🎂 생일</option>
      <option value="other">📌 기타</option>
    </select>
    <input type="datetime-local" id="editDue">
    <div class="modal-alarm">
      <label><input type="checkbox" id="editAlarm7d"> 🔔 1주일 전</label>
      <label><input type="checkbox" id="editAlarm1d"> 🔔 하루 전</label>
      <label><input type="checkbox" id="editAlarm0d"> 🔔 당일 아침 9시</label>
    </div>
    <label class="modal-repeat"><input type="checkbox" id="editRepeat"> 🔁 매년 반복</label>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBAHHRv_CWzDXJ2aHrG5uTysDZ7JcfewEk",
  authDomain: "claude-grok-gallery.firebaseapp.com",
  projectId: "claude-grok-gallery",
  storageBucket: "claude-grok-gallery.firebasestorage.app",
  messagingSenderId: "907968891772",
  appId: "1:907968891772:web:50d9f0f9839d949e59b2f9"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let items         = [];
let currentFilter = 'all';
let editingId     = null;
let detailId      = null;
let todoPage      = 1;
let donePage      = 1;
const PAGE_SIZE   = 10;

const CAT_LABELS = {
  work:'💼 업무', ai:'🤖 AI 작업', study:'📚 공부',
  personal:'🌟 개인', birthday:'🎂 생일', other:'📌 기타'
};

/* 알림 */
window.requestNotify = async function() {
  if (!('Notification' in window)) { showToast('❌ 알림 미지원'); return; }
  const perm = await Notification.requestPermission();
  updateNotifyStatus();
  showToast(perm==='granted' ? '✅ 알림 허용됨!' : '❌ 알림 거부됨');
};
function updateNotifyStatus() {
  const el = document.getElementById('notifyStatus');
  if (!('Notification' in window)) { el.textContent='❌ 미지원'; el.className='notify-status notify-off'; return; }
  if (Notification.permission==='granted') { el.textContent='✅ 알림 허용됨 — 작동 중'; el.className='notify-status notify-on'; }
  else if (Notification.permission==='denied') { el.textContent='❌ 알림 차단됨 — 브라우저 설정에서 허용'; el.className='notify-status notify-off'; }
  else { el.textContent='⚠️ 알림 미허용 — 위 버튼을 눌러 허용'; el.className='notify-status notify-off'; }
}
updateNotifyStatus();

function sendNotification(title, body) {
  if (Notification.permission!=='granted') return;
  new Notification(title, { body, icon:'https://interlab001-afk.github.io/favicon.ico' });
}
function checkAlarms() {
  if (Notification.permission!=='granted') return;
  const now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  items.forEach(it => {
    if (it.done||!it.due) return;
    let d=new Date(it.due);
    if (it.repeat) { d=new Date(now.getFullYear(),d.getMonth(),d.getDate(),9,0,0); if(d<today) d.setFullYear(d.getFullYear()+1); }
    const diff=d-now, diffDays=Math.floor(diff/86400000), hh=now.getHours(), mm=now.getMinutes();
    if (it.alarm7d&&diffDays===7&&hh===9&&mm===0) sendNotification('🔔 1주일 후!',`📌 ${it.text}`);
    if (it.alarm1d&&diffDays===1&&hh===9&&mm===0) sendNotification('🔔 내일!',`📌 ${it.text}`);
    if (it.alarm0d&&diffDays===0&&hh===9&&mm===0) sendNotification('🔔 오늘!',`📌 ${it.text}`);
    if (Math.abs(diff)<60000&&diff>0) sendNotification('⏰ 지금!',`📌 ${it.text}`);
  });
}
setInterval(checkAlarms,60000);
checkAlarms();

/* 로드 */
async function loadTodos() {
  try {
    const snap = await getDocs(query(collection(db,'todos'), orderBy('date','desc')));
    items = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderTodos();
  } catch(e) { showToast('❌ 로드 실패'); }
}

window.setFilter = function(f,btn) {

/* D-day */
function getDday(due,repeat) {
  if (!due) return null;
  const now=new Date(); let d=new Date(due);
  if (repeat) { d=new Date(now.getFullYear(),d.getMonth(),d.getDate()); if(d<new Date(now.getFullYear(),now.getMonth(),now.getDate())) d.setFullYear(d.getFullYear()+1); }
  const diff=Math.ceil((d-now)/86400000);
  if (diff<0)  return {label:`D+${Math.abs(diff)}`,cls:'dday-past'};
  if (diff===0) return {label:'D-Day!',cls:'dday-hot'};
  if (diff<=3)  return {label:`D-${diff}`,cls:'dday-hot'};
  if (diff<=7)  return {label:`D-${diff}`,cls:'dday-warn'};
  return {label:`D-${diff}`,cls:'dday-ok'};
}

/* 날짜 포맷 */
function fmtShort(iso) {
  if (!iso) return '';
  const d=new Date(iso), M=d.getMonth()+1, D=d.getDate();
  const hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
  return (hh==='00'&&mm==='00') ? `${M}/${D}` : `${M}/${D} ${hh}:${mm}`;
}
function fmtReg(iso) {
  if (!iso) return '';
  const d=new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

/* 페이지네이션 렌더 */
function renderPagination(containerId, total, currentPg, onClickFn, activeCls) {
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const container  = document.getElementById(containerId);
  if (totalPages <= 1) { container.innerHTML=''; return; }
  let html = '';
  // 이전
  html += `<button class="pg-btn" ${currentPg===1?'disabled':''} onclick="${onClickFn}(${currentPg-1})">‹</button>`;
  // 페이지 번호
  for (let i=1; i<=totalPages; i++) {
    const isCur = i===currentPg;
    html += `<button class="pg-btn${isCur?' '+activeCls:''}" onclick="${onClickFn}(${i})">${i}</button>`;
  }
  // 다음
  html += `<button class="pg-btn" ${currentPg===totalPages?'disabled':''} onclick="${onClickFn}(${currentPg+1})">›</button>`;
  container.innerHTML = html;
}

/* 페이지 이동 */
window.goTodoPage = function(p) { todoPage=p; renderTodos(); };
window.goDonePage = function(p) { donePage=p; renderTodos(); };

/* 렌더링 */
window.renderTodos = function() {
  const total=items.length, doneCount=items.filter(i=>i.done).length;
  const pct=total?Math.round((doneCount/total)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('todoCountLabel').textContent=doneCount+'/'+total;

  const searchQ=(document.getElementById('searchInput')?.value||'').toLowerCase();
  let filtered=items.filter(it=>{
    if(currentFilter==='todo') return !it.done;
    if(currentFilter==='done') return it.done;
    if(currentFilter==='alarm') return it.due;
    return true;
  }).filter(it=>!searchQ||it.text.toLowerCase().includes(searchQ));

  const todoAll=filtered.filter(it=>!it.done);
  const doneAll=filtered.filter(it=>it.done);

  // 배너 카운터
  document.getElementById('bannerTodo').textContent=todoAll.length;
  document.getElementById('bannerDone').textContent=doneAll.length;
  document.getElementById('todoColCount').textContent=todoAll.length;
  document.getElementById('doneColCount').textContent=doneAll.length;

  // 페이지 슬라이스
  const todoSlice=todoAll.slice((todoPage-1)*PAGE_SIZE, todoPage*PAGE_SIZE);
  const doneSlice=doneAll.slice((donePage-1)*PAGE_SIZE, donePage*PAGE_SIZE);

  const now=new Date();
  function makeCard(it) {
    const dday=getDday(it.due,it.repeat);
    const isSoon=it.due&&!it.done&&(new Date(it.due)-now)<86400000*2;
    const tagCls=it.done?'done-tag-color':'todo-tag-color';
    const cardCls=it.done?'done-card':'todo-card';
    const duePart=it.due?`<span class="mini-due">⏰ ${fmtShort(it.due)}</span>`:'';
    const regPart=`<span class="mini-reg">등록 ${fmtReg(it.date)}</span>`;
    const ddayHtml=dday?`<span class="mini-dday ${dday.cls}">${dday.label}</span>`:'';
    const icons=[(it.alarm7d||it.alarm1d||it.alarm0d)?'🔔':'',it.repeat?'🔁':''].filter(Boolean).join('');
    return `<div class="mini-card ${cardCls}${isSoon?' alarm-soon':''}" onclick="openDetailModal('${it.id}')">
      <div class="mini-title">${escapeHtml(it.text)}</div>
      <div class="mini-date-row">${duePart}${regPart}</div>
      <div class="mini-footer">
        <span class="mini-tag ${tagCls}">${CAT_LABELS[it.cat]||it.cat}</span>
        <span style="display:flex;gap:4px;align-items:center;">${ddayHtml}${icons?`<span class="mini-icons">${icons}</span>`:''}</span>
      </div>
    </div>`;
  }

  document.getElementById('todoCol').innerHTML=todoSlice.length
    ?todoSlice.map(makeCard).join('')
    :'<div class="empty-col"><div class="icon">🎉</div>할일 없음!</div>';
  document.getElementById('doneCol').innerHTML=doneSlice.length
    ?doneSlice.map(makeCard).join('')
    :'<div class="empty-col"><div class="icon">📭</div>완료 없음</div>';

  renderPagination('todoPagination',todoAll.length,todoPage,'goTodoPage','active-todo');
  renderPagination('donePagination',doneAll.length,donePage,'goDonePage','active-done');
};

window.openDetailModal = function(id) {
  const it=items.find(x=>x.id===id); if(!it) return;
  detailId=id;
  document.getElementById('detailTitle').textContent=it.text;
  document.getElementById('detailCat').textContent=CAT_LABELS[it.cat]||it.cat;
  document.getElementById('detailDate').textContent=it.date?new Date(it.date).toLocaleString('ko'):'-';
  document.getElementById('detailStatus').innerHTML=it.done
    ?'<span style="color:#10b981;font-weight:700;">✅ 완료</span>'
    :'<span style="color:#ef4444;font-weight:700;">⏳ 미완료</span>';
  const dueRow=document.getElementById('detailDueRow');
  if (it.due) {
    dueRow.style.display='flex';
    document.getElementById('detailDue').textContent=new Date(it.due).toLocaleString('ko');
    const dday=getDday(it.due,it.repeat);
    const ddayEl=document.getElementById('detailDday');
    if(dday){ddayEl.textContent=dday.label;ddayEl.className='detail-dday '+dday.cls;}else ddayEl.textContent='';
  } else dueRow.style.display='none';
  const alarms=[it.alarm7d?'1주일 전':'',it.alarm1d?'하루 전':'',it.alarm0d?'당일 9시':''].filter(Boolean);
  const alarmRow=document.getElementById('detailAlarmRow');
  if(alarms.length){alarmRow.style.display='flex';document.getElementById('detailAlarm').textContent='🔔 '+alarms.join(', ');}
  else alarmRow.style.display='none';
  document.getElementById('detailRepeatRow').style.display=it.repeat?'flex':'none';
  const btn=document.getElementById('detailToggleBtn');
  if(it.done){btn.textContent='↩️ 미완료로 변경';btn.className='btn btn-cancel detail-toggle-btn';}
  else{btn.textContent='✅ 완료로 표시';btn.className='btn btn-success detail-toggle-btn';}
  document.getElementById('detailModal').classList.add('show');
};

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeEditModal();});

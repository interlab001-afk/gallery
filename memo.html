<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 메모</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0f0f1a; color:#e2e8f0; font-family:'Segoe UI',sans-serif; min-height:100vh; }
.navbar { display:flex; flex-wrap:wrap; gap:6px; padding:10px 16px; background:#1e1b4b; border-bottom:1px solid #3730a3; position:sticky; top:0; z-index:100; }
.navbar a { padding:6px 12px; border-radius:20px; text-decoration:none; font-size:0.8rem; font-weight:600; transition:all 0.2s; }
.nav-home   { background:#1a1a2e; border:1px solid #6366f1; color:#a5b4fc; }
.nav-gallery{ background:#1a1a2e; border:1px solid #8b5cf6; color:#c4b5fd; }
.nav-gen    { background:#1a1a2e; border:1px solid #ec4899; color:#f9a8d4; }
.nav-links  { background:#1a1a2e; border:1px solid #3b82f6; color:#93c5fd; }
.nav-ideas  { background:#1a1a2e; border:1px solid #fbbf24; color:#fbbf24; }
.nav-todos  { background:#1a1a2e; border:1px solid #ef4444; color:#fca5a5; }
.nav-memo   { background:#1a1a2e; border:1px solid #10b981; color:#6ee7b7; }
.navbar a:hover { opacity:0.8; transform:translateY(-1px); }
.header { background:linear-gradient(135deg,#064e3b,#065f46); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:1.3rem; font-weight:700; color:#6ee7b7; }
.badge { background:#064e3b; border:1px solid #10b981; color:#6ee7b7; padding:4px 12px; border-radius:12px; font-size:0.8rem; }
.form-card { background:#1e1b4b; border:1px solid #2d2b5a; border-radius:12px; padding:16px; margin:16px; }
.form-card h3 { font-size:0.95rem; color:#6ee7b7; margin-bottom:12px; font-weight:700; }
.form-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.form-row input, .form-row select, .form-row textarea {
  background:#12122a; border:1px solid #374151; color:#e2e8f0;
  padding:9px 12px; border-radius:8px; font-size:0.85rem; font-family:inherit;
}
.form-row input { flex:1; min-width:200px; }
.form-row select { min-width:140px; }
.form-row textarea { flex:1; min-width:200px; min-height:100px; resize:vertical; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline:none; border-color:#10b981; }
.btn { padding:9px 18px; border:none; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-primary { background:linear-gradient(135deg,#065f46,#10b981); color:white; }
.btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
.btn-cancel { background:#374151; color:#e2e8f0; margin-left:8px; }
.filter-section { padding:0 16px 12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.filter-section input { background:#1e1b4b; border:1px solid #374151; color:#e2e8f0; padding:8px 14px; border-radius:20px; font-size:0.85rem; flex:1; min-width:180px; }
.filter-section input:focus { outline:none; border-color:#10b981; }
.filter-btn { padding:6px 14px; border-radius:20px; border:1px solid #374151; background:#1e1b4b; color:#9ca3af; font-size:0.8rem; cursor:pointer; transition:all 0.2s; font-weight:600; }
.filter-btn.active { background:#065f46; border-color:#10b981; color:white; }
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; padding:0 16px 24px; }
.memo-card { background:#1e1b4b; border:1px solid #2d2b5a; border-radius:12px; padding:14px; transition:all 0.3s; cursor:grab; }
.memo-card:active { cursor:grabbing; }
.memo-card:hover { border-color:#10b981; transform:translateY(-2px); box-shadow:0 4px 16px rgba(16,185,129,0.15); }
.memo-card.pinned { border-color:#10b981; background:#0a1f18; }
.memo-card.status-todo { border-left:4px solid #f59e0b; }
.memo-card.status-done { border-left:4px solid #6366f1; opacity:0.85; }
.memo-card.sortable-ghost { opacity:0.3; background:#064e3b; }
.memo-card.sortable-chosen { box-shadow:0 8px 24px rgba(16,185,129,0.3); }
.drag-handle { color:#374151; font-size:0.8rem; margin-bottom:6px; cursor:grab; user-select:none; }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.card-title { font-weight:700; color:#6ee7b7; font-size:0.95rem; flex:1; }
.card-title.done-title { text-decoration:line-through; opacity:0.6; }
.pin-icon { cursor:pointer; font-size:1rem; opacity:0.5; transition:opacity 0.2s; }
.pin-icon.active { opacity:1; }
.card-body-text { color:#d1d5db; font-size:0.85rem; line-height:1.6; margin-bottom:10px; white-space:pre-wrap; }
.expand-btn { background:none; border:none; color:#10b981; font-size:0.75rem; cursor:pointer; padding:0 0 8px 0; font-weight:600; }
.expand-btn:hover { text-decoration:underline; }
.card-meta { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:4px; }
.card-tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; background:#064e3b; color:#6ee7b7; border:1px solid #10b981; }
.status-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; }
.status-badge.todo  { background:#451a03; color:#fde68a; border:1px solid #f59e0b; }
.status-badge.done  { background:#1e1b4b; color:#a5b4fc; border:1px solid #6366f1; }
.status-badge.memo  { background:#064e3b; color:#6ee7b7; border:1px solid #10b981; }
.card-date { color:#6b7280; font-size:0.72rem; }
.card-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.card-actions button { flex:1; padding:6px; border:none; border-radius:6px; font-size:0.75rem; cursor:pointer; font-weight:600; min-width:48px; }
.btn-copy-c  { background:#0a1f18; color:#6ee7b7; border:1px solid #10b981 !important; }
.btn-edit    { background:#1e3a5f; color:#93c5fd; border:1px solid #3b82f6 !important; }
.btn-del     { background:#7f1d1d; color:#fca5a5; border:1px solid #ef4444 !important; }
.btn-todo    { background:#451a03; color:#fde68a; border:1px solid #f59e0b !important; }
.btn-done    { background:#1e1b4b; color:#a5b4fc; border:1px solid #6366f1 !important; }
.btn-memo-st { background:#064e3b; color:#6ee7b7; border:1px solid #10b981 !important; }
.empty-state { text-align:center; padding:60px 20px; color:#6b7280; grid-column:1/-1; }
.empty-state .icon { font-size:3rem; margin-bottom:12px; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#065f46; color:white; padding:12px 24px; border-radius:24px; font-size:0.9rem; font-weight:600; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:#1e1b4b; border:1px solid #10b981; border-radius:16px; padding:24px; width:90%; max-width:560px; }
.modal h3 { color:#6ee7b7; font-size:1rem; margin-bottom:16px; }
.modal input, .modal select, .modal textarea { width:100%; background:#12122a; border:1px solid #374151; color:#e2e8f0; padding:9px 12px; border-radius:8px; font-size:0.85rem; font-family:inherit; margin-bottom:10px; }
.modal textarea { min-height:120px; resize:vertical; }
.modal input:focus, .modal select:focus, .modal textarea:focus { outline:none; border-color:#10b981; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-home">🏠 홈</a>
  <a href="gall.html" class="nav-gallery">🖼️ 갤러리</a>
  <a href="prompt-generator.html" class="nav-gen">✨ 생성기</a>
  <a href="links.html" class="nav-links">🔗 링크</a>
  <a href="ideas.html" class="nav-ideas">💡 아이디어</a>
  <a href="todos.html" class="nav-todos">✅ 할일</a>
  <a href="memo.html" class="nav-memo">📝 메모</a>
</nav>

<div class="header">
  <h1>📝 메모</h1>
  <span class="badge" id="memoCount">0개</span>
</div>

<div class="form-card">
  <h3>➕ 메모 작성</h3>
  <div class="form-row">
    <input type="text" id="memoTitle" placeholder="제목">
    <select id="memoCategory">
      <option value="general">📝 일반</option>
      <option value="ai">🤖 AI</option>
      <option value="prompt">✨ 프롬프트</option>
      <option value="ref">📚 참고</option>
      <option value="temp">⏰ 임시</option>
      <option value="other">💭 기타</option>
    </select>
    <select id="memoStatus">
      <option value="memo">📝 메모</option>
      <option value="todo">📋 해야할일</option>
      <option value="done">✅ 한일</option>
    </select>
  </div>
  <div class="form-row">
    <textarea id="memoBody" placeholder="내용을 자유롭게 입력하세요..."></textarea>
  </div>
  <button class="btn btn-primary" onclick="addMemo()">📝 저장</button>
</div>

<div class="filter-section">
  <input type="text" id="searchInput" placeholder="🔍 검색..." oninput="renderMemos()">
  <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="setFilter('status-todo',this)">📋 해야할일</button>
  <button class="filter-btn" onclick="setFilter('status-done',this)">✅ 한일</button>
  <button class="filter-btn" onclick="setFilter('ai',this)">🤖 AI</button>
  <button class="filter-btn" onclick="setFilter('prompt',this)">✨ 프롬프트</button>
  <button class="filter-btn" onclick="setFilter('ref',this)">📚 참고</button>
  <button class="filter-btn" onclick="setFilter('temp',this)">⏰ 임시</button>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ 메모 수정</h3>
    <input type="text" id="editTitle" placeholder="제목">
    <select id="editCategory">
      <option value="general">📝 일반</option>
      <option value="ai">🤖 AI</option>
      <option value="prompt">✨ 프롬프트</option>
      <option value="ref">📚 참고</option>
      <option value="temp">⏰ 임시</option>
      <option value="other">💭 기타</option>
    </select>
    <select id="editStatus">
      <option value="memo">📝 메모</option>
      <option value="todo">📋 해야할일</option>
      <option value="done">✅ 한일</option>
    </select>
    <textarea id="editBody" placeholder="내용"></textarea>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, writeBatch }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBAHHRv_CWzDXJ2aHrG5uTysDZ7JcfewEk",
  authDomain: "claude-grok-gallery.firebaseapp.com",
  projectId: "claude-grok-gallery",
  storageBucket: "claude-grok-gallery.firebasestorage.app",
  messagingSenderId: "907968891772",
  appId: "1:907968891772:web:50d9f0f9839d949e59b2f9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let items = [];
let sortableInstance = null;
let currentFilter = 'all';
let editingId = null;
const expandedIds = new Set();
const CAT_LABELS = { general:'📝 일반', ai:'🤖 AI', prompt:'✨ 프롬프트', ref:'📚 참고', temp:'⏰ 임시', other:'💭 기타' };
const STATUS_LABELS = { memo:'📝 메모', todo:'📋 해야할일', done:'✅ 한일' };
const PREVIEW_LENGTH = 80;

async function loadMemos() {
  try {
    const snap = await getDocs(collection(db, 'memos'));
    items = snap.docs.map((d, i) => ({
      id: d.id,
      order: d.data().order !== undefined ? d.data().order : i,
      ...d.data()
    }));
    items.sort((a, b) => (a.order || 0) - (b.order || 0));
    renderMemos();
  } catch(e) { showToast('❌ 로드 실패: ' + e.message); }
}

window.addMemo = async function() {
  const title  = document.getElementById('memoTitle').value.trim();
  const body   = document.getElementById('memoBody').value.trim();
  const cat    = document.getElementById('memoCategory').value;
  const status = document.getElementById('memoStatus').value;
  if (!title || !body) { showToast('⚠️ 제목과 내용을 입력하세요'); return; }
  try {
    const newOrder = items.length > 0 ? Math.max(...items.map(x => x.order || 0)) + 1 : 0;
    await addDoc(collection(db,'memos'), {
      title, body, cat, status,
      pinned: false, order: newOrder,
      date: new Date().toISOString()
    });
    document.getElementById('memoTitle').value = '';
    document.getElementById('memoBody').value  = '';
    document.getElementById('memoStatus').value = 'memo';
    await loadMemos();
    showToast('✅ 메모 저장됨!');
  } catch(e) { showToast('❌ 저장 실패: ' + e.message); }
};

window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderMemos();
};

window.toggleExpand = function(id) {
  if (expandedIds.has(id)) expandedIds.delete(id);
  else expandedIds.add(id);
  renderMemos();
};

window.openEditModal = function(id) {
  const it = items.find(x => x.id === id);
  if (!it) return;
  editingId = id;
  document.getElementById('editTitle').value    = it.title;
  document.getElementById('editBody').value     = it.body;
  document.getElementById('editCategory').value = it.cat || 'general';
  document.getElementById('editStatus').value   = it.status || 'memo';
  document.getElementById('editModal').classList.add('show');
};

window.closeEditModal = function() {
  editingId = null;
  document.getElementById('editModal').classList.remove('show');
};

window.saveEdit = async function() {
  if (!editingId) return;
  const title  = document.getElementById('editTitle').value.trim();
  const body   = document.getElementById('editBody').value.trim();
  const cat    = document.getElementById('editCategory').value;
  const status = document.getElementById('editStatus').value;
  if (!title || !body) { showToast('⚠️ 제목과 내용을 입력하세요'); return; }
  try {
    await updateDoc(doc(db,'memos',editingId), { title, body, cat, status });
    closeEditModal();
    await loadMemos();
    showToast('✅ 수정 완료!');
  } catch(e) { showToast('❌ 수정 실패: ' + e.message); }
};

window.quickStatus = async function(id, newStatus) {
  try {
    await updateDoc(doc(db,'memos',id), { status: newStatus });
    await loadMemos();
    const labels = { memo:'📝 메모로 변경', todo:'📋 해야할일로 변경', done:'✅ 한일로 변경' };
    showToast(labels[newStatus] || '✅ 변경됨!');
  } catch(e) { showToast('❌ 오류'); }
};

window.renderMemos = function() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = items.filter(it => {
    if (currentFilter === 'status-todo' && it.status !== 'todo') return false;
    if (currentFilter === 'status-done' && it.status !== 'done') return false;
    if (currentFilter !== 'all' && currentFilter !== 'status-todo' && currentFilter !== 'status-done' && it.cat !== currentFilter) return false;
    if (search && !it.title.toLowerCase().includes(search) && !it.body.toLowerCase().includes(search)) return false;
    return true;
  }).sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || (a.order||0)-(b.order||0));

  document.getElementById('memoCount').textContent = filtered.length + '개';
  const grid = document.getElementById('cardsGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>메모를 작성해보세요</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(it => {
    const st = it.status || 'memo';
    const isExpanded = expandedIds.has(it.id);
    const isLong = it.body.length > PREVIEW_LENGTH;
    const displayText = isLong && !isExpanded ? it.body.substring(0, PREVIEW_LENGTH) + '...' : it.body;
    const expandBtn = isLong
      ? `<button class="expand-btn" onclick="toggleExpand('${it.id}')">${isExpanded ? '🔼 접기' : '🔽 더 보기'}</button>`
      : '';

    // 빠른 상태변경 버튼: 현재 상태 제외한 2개 표시
    const statusBtns = ['memo','todo','done']
      .filter(s => s !== st)
      .map(s => {
        const cls = s==='todo'?'btn-todo': s==='done'?'btn-done':'btn-memo-st';
        const lbl = s==='todo'?'📋 해야할일': s==='done'?'✅ 한일':'📝 메모';
        return `<button class="${cls}" onclick="quickStatus('${it.id}','${s}')">${lbl}</button>`;
      }).join('');

    return `
    <div class="memo-card${it.pinned?' pinned':''} status-${st}" data-id="${it.id}">
      <div class="drag-handle">⠿ 드래그로 순서 변경</div>
      <div class="card-top">
        <div class="card-title${st==='done'?' done-title':''}">${escapeHtml(it.title)}</div>
        <span class="pin-icon${it.pinned?' active':''}" onclick="togglePin('${it.id}',${it.pinned})">📌</span>
      </div>
      <div class="card-body-text">${escapeHtml(displayText)}</div>
      ${expandBtn}
      <div class="card-meta">
        <span class="card-tag">${CAT_LABELS[it.cat]||it.cat}</span>
        <span class="status-badge ${st}">${STATUS_LABELS[st]||st}</span>
        <span class="card-date">${it.date ? new Date(it.date).toLocaleDateString('ko') : ''}</span>
      </div>
      <div class="card-actions">
        <button class="btn-copy-c" onclick="copyMemo('${it.id}')">📋 복사</button>
        <button class="btn-edit"   onclick="openEditModal('${it.id}')">✏️ 수정</button>
        <button class="btn-del"    onclick="deleteMemo('${it.id}')">🗑️ 삭제</button>
      </div>
      <div class="card-actions" style="margin-top:4px;">
        ${statusBtns}
      </div>
    </div>`;
  }).join('');

  if (sortableInstance) { sortableInstance.destroy(); }
  sortableInstance = Sortable.create(grid, {
    animation: 150,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    handle: '.drag-handle',
    onEnd: async function() {
      const cards = grid.querySelectorAll('.memo-card');
      const newOrder = Array.from(cards).map((card, index) => ({ id: card.dataset.id, order: index }));
      try {
        const batch = writeBatch(db);
        newOrder.forEach(({ id, order }) => batch.update(doc(db,'memos',id), { order }));
        await batch.commit();
        newOrder.forEach(({ id, order }) => { const item = items.find(x=>x.id===id); if(item) item.order=order; });
        showToast('✅ 순서 저장됨!');
      } catch(e) { showToast('❌ 순서 저장 실패'); }
    }
  });
};

window.togglePin = async function(id, pinned) {
  try {
    await updateDoc(doc(db,'memos',id), { pinned:!pinned });
    await loadMemos();
    showToast(pinned ? '📌 핀 해제' : '📌 핀 고정!');
  } catch(e) { showToast('❌ 오류'); }
};

window.deleteMemo = async function(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db,'memos',id));
    expandedIds.delete(id);
    await loadMemos();
    showToast('🗑️ 삭제됨!');
  } catch(e) { showToast('❌ 삭제 실패'); }
};

window.copyMemo = function(id) {
  const it = items.find(x => x.id === id);
  if (!it) return;
  navigator.clipboard.writeText(it.title + '\n' + it.body)
    .then(() => showToast('📋 복사됨!'))
    .catch(() => showToast('❌ 복사 실패'));
};

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('editModal').addEventListener('click', function(e) {

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖼️ AI 갤러리</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f1a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

/* 네비바 */
.navbar {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 10px 16px; background: #1e1b4b;
  border-bottom: 1px solid #3730a3; position: sticky; top: 0; z-index: 100;
}
.navbar a {
  padding: 6px 12px; border-radius: 20px; text-decoration: none;
  font-size: 0.8rem; font-weight: 600; transition: all 0.2s;
}
.nav-home   { background:#1a1a2e; border:1px solid #6366f1; color:#a5b4fc; }
.nav-gallery{ background:#1a1a2e; border:1px solid #8b5cf6; color:#c4b5fd; }
.nav-gen    { background:#1a1a2e; border:1px solid #ec4899; color:#f9a8d4; }
.nav-links  { background:#1a1a2e; border:1px solid #3b82f6; color:#93c5fd; }
.nav-ideas  { background:#1a1a2e; border:1px solid #fbbf24; color:#fbbf24; }
.nav-todos  { background:#1a1a2e; border:1px solid #ef4444; color:#fca5a5; }
.nav-memo   { background:#1a1a2e; border:1px solid #10b981; color:#6ee7b7; }
.navbar a:hover { opacity: 0.8; transform: translateY(-1px); }

/* 헤더 */
.header {
  background: linear-gradient(135deg, #1e1b4b, #312e81);
  padding: 20px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 1.5rem; font-weight: 700; color: #c4b5fd; }
.header-right { display: flex; gap: 10px; align-items: center; }

/* 업로드 영역 */
.upload-section {
  background: #1e1b4b; border: 2px dashed #4c1d95;
  border-radius: 12px; padding: 24px; margin: 20px;
  text-align: center; cursor: pointer; transition: all 0.3s;
}
.upload-section:hover { border-color: #7c3aed; background: #1e1b4b; }
.upload-section h3 { color: #a5b4fc; margin-bottom: 8px; }
.upload-section p { color: #6b7280; font-size: 0.9rem; }

/* 입력 폼 */
.form-section { padding: 0 20px 20px; }
.form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.form-row input, .form-row textarea, .form-row select {
  background: #1e1b4b; border: 1px solid #4c1d95; color: #e2e8f0;
  padding: 10px 14px; border-radius: 8px; font-size: 0.9rem;
  font-family: inherit; resize: vertical;
}
.form-row input { flex: 1; min-width: 200px; }
.form-row textarea { flex: 1; min-width: 200px; min-height: 80px; }
.form-row select { min-width: 140px; }
.form-row input:focus, .form-row textarea:focus, .form-row select:focus {
  outline: none; border-color: #7c3aed;
}

/* 버튼 */
.btn {
  padding: 10px 20px; border: none; border-radius: 8px;
  font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: white; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-danger { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5; }
.btn-danger:hover { background: #991b1b; }
.btn-copy { background: #1e3a5f; border: 1px solid #3b82f6; color: #93c5fd; }
.btn-copy:hover { background: #1e40af; }

/* 필터 */
.filter-section {
  padding: 0 20px 16px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.filter-section input {
  background: #1e1b4b; border: 1px solid #4c1d95; color: #e2e8f0;
  padding: 8px 14px; border-radius: 20px; font-size: 0.85rem;
  flex: 1; min-width: 200px;
}
.filter-btn {
  padding: 6px 14px; border-radius: 20px; border: 1px solid #4c1d95;
  background: #1e1b4b; color: #a5b4fc; font-size: 0.8rem; cursor: pointer;
  transition: all 0.2s;
}
.filter-btn.active { background: #7c3aed; border-color: #7c3aed; color: white; }

/* 갤러리 그리드 */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px; padding: 0 20px 20px;
}
.gallery-card {
  background: #1e1b4b; border: 1px solid #4c1d95;
  border-radius: 12px; overflow: hidden; transition: all 0.3s;
}
.gallery-card:hover { transform: translateY(-4px); border-color: #7c3aed; box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3); }
.gallery-card img {
  width: 100%; aspect-ratio: 1; object-fit: cover;
  background: #0f0f1a; cursor: pointer;
}
.card-body { padding: 12px; }
.card-title { font-weight: 600; color: #c4b5fd; margin-bottom: 6px; font-size: 0.95rem; }
.card-prompt {
  color: #9ca3af; font-size: 0.78rem; line-height: 1.4;
  max-height: 60px; overflow: hidden; margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
}
.card-meta { display: flex; justify-content: space-between; align-items: center; }
.card-date { color: #6b7280; font-size: 0.75rem; }
.card-tag {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 0.7rem; font-weight: 600;
  background: #4c1d95; color: #c4b5fd;
}
.card-actions { display: flex; gap: 6px; margin-top: 8px; }
.card-actions button {
  flex: 1; padding: 6px; border: none; border-radius: 6px;
  font-size: 0.75rem; cursor: pointer; font-weight: 600; transition: all 0.2s;
}

/* 모달 */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal-overlay.visible { display: flex; }
.modal-box {
  background: #1e1b4b; border: 1px solid #7c3aed;
  border-radius: 16px; max-width: 800px; width: 100%;
  max-height: 90vh; overflow-y: auto;
}
.modal-img { width: 100%; max-height: 500px; object-fit: contain; border-radius: 12px 12px 0 0; }
.modal-body { padding: 20px; }
.modal-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
.modal-prompt {
  background: #0f0f1a; border: 1px solid #4c1d95;
  padding: 12px; border-radius: 8px; font-size: 0.85rem;
  color: #d1d5db; line-height: 1.6; margin-bottom: 12px; white-space: pre-wrap;
}
.modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.modal-close {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none; color: #9ca3af;
  font-size: 1.5rem; cursor: pointer; line-height: 1;
}

/* 토스트 */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #7c3aed; color: white; padding: 12px 24px;
  border-radius: 24px; font-size: 0.9rem; font-weight: 600;
  z-index: 9999; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* 빈 상태 */
.empty-state {
  text-align: center; padding: 60px 20px; color: #6b7280;
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

/* 미리보기 */
#previewImg {
  width: 100%; max-height: 200px; object-fit: contain;
  border-radius: 8px; margin-top: 10px; display: none;
  background: #0f0f1a;
}

@media (max-width: 600px) {
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .form-row { flex-direction: column; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-home">🏠 홈</a>
  <a href="gall.html" class="nav-gallery">🖼️ 갤러리</a>
  <a href="prompt-generator.html" class="nav-gen">✨ 생성기</a>
  <a href="links.html" class="nav-links">🔗 링크</a>
  <a href="ideas.html" class="nav-ideas">💡 아이디어</a>
  <a href="todos.html" class="nav-todos">✅ 할일</a>
  <a href="memo.html" class="nav-memo">📝 메모</a>
</nav>

<div class="header">
  <h1>🖼️ AI 갤러리</h1>
  <div class="header-right">
    <span id="galleryCount" style="color:#9ca3af;font-size:0.85rem;">0개</span>
  </div>
</div>

<!-- 업로드 영역 -->
<div class="upload-section" id="dropZone" onclick="document.getElementById('fileInput').click()">
  <h3>📁 이미지 업로드</h3>
  <p>클릭하거나 드래그&드롭으로 이미지를 추가하세요</p>
  <input type="file" id="fileInput" accept="image/*" style="display:none" multiple>
  <img id="previewImg" alt="미리보기">
</div>

<!-- 입력 폼 -->
<div class="form-section">
  <div class="form-row">
    <input type="text" id="imgTitle" placeholder="이미지 제목 (선택)">
    <select id="imgCategory">
      <option value="general">🎨 일반</option>
      <option value="portrait">👤 인물</option>
      <option value="landscape">🌄 풍경</option>
      <option value="fantasy">🔮 판타지</option>
      <option value="animal">🐾 동물</option>
      <option value="architecture">🏛️ 건축</option>
      <option value="abstract">✨ 추상</option>
      <option value="history">⚔️ 역사</option>
    </select>
  </div>
  <div class="form-row">
    <textarea id="imgPrompt" placeholder="사용한 프롬프트를 입력하세요..."></textarea>
  </div>
  <div class="form-row">
    <button class="btn btn-primary" onclick="uploadImage()">📤 갤러리에 저장</button>
  </div>
</div>

<!-- 필터 -->
<div class="filter-section">
  <input type="text" id="searchInput" placeholder="🔍 검색..." oninput="renderGallery()">
  <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
  <button class="filter-btn" onclick="setFilter('portrait', this)">👤 인물</button>
  <button class="filter-btn" onclick="setFilter('landscape', this)">🌄 풍경</button>
  <button class="filter-btn" onclick="setFilter('fantasy', this)">🔮 판타지</button>
  <button class="filter-btn" onclick="setFilter('animal', this)">🐾 동물</button>
  <button class="filter-btn" onclick="setFilter('history', this)">⚔️ 역사</button>
</div>

<!-- 갤러리 그리드 -->
<div class="gallery-grid" id="galleryGrid"></div>

<!-- 이미지 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box" style="position:relative;">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modalImg" class="modal-img" alt="">
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-prompt" id="modalPrompt"></div>
      <div class="modal-actions">
        <button class="btn btn-copy" onclick="copyText(document.getElementById('modalPrompt').textContent, '프롬프트 복사됨!')">📋 프롬프트 복사</button>
        <button class="btn btn-danger" onclick="deleteCurrentItem()">🗑️ 삭제</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

const firebaseConfig = {
  apiKey: "AIzaSyBAHHRv_CWzDXJ2aHrG5uTysDZ7JcfewEk",
  authDomain: "claude-grok-gallery.firebaseapp.com",
  projectId: "claude-grok-gallery",
  storageBucket: "claude-grok-gallery.firebasestorage.app",
  messagingSenderId: "907968891772",
  appId: "1:907968891772:web:50d9f0f9839d949e59b2f9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let items = [];
let currentFilter = 'all';
let currentItemId = null;
let selectedFile = null;

const CATEGORY_LABELS = {
  general:'🎨 일반', portrait:'👤 인물', landscape:'🌄 풍경',
  fantasy:'🔮 판타지', animal:'🐾 동물', architecture:'🏛️ 건축',
  abstract:'✨ 추상', history:'⚔️ 역사'
};

// 파일 선택
document.getElementById('fileInput').addEventListener('change', e => {
  selectedFile = e.target.files[0];
  if (selectedFile) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.getElementById('previewImg');
      img.src = ev.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(selectedFile);
  }
});

// 드래그 앤 드롭
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#7c3aed'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#4c1d95'; });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.borderColor = '#4c1d95';
  selectedFile = e.dataTransfer.files[0];
  if (selectedFile && selectedFile.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.getElementById('previewImg');
      img.src = ev.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(selectedFile);
  }
});

// 이미지 업로드
window.uploadImage = async function() {
  if (!selectedFile) { showToast('📁 이미지를 먼저 선택하세요!'); return; }
  const title = document.getElementById('imgTitle').value.trim() || '무제';
  const prompt = document.getElementById('imgPrompt').value.trim();
  const category = document.getElementById('imgCategory').value;
  showToast('⏳ 업로드 중...');
  try {
    const storageRef = ref(storage, 'gallery/' + Date.now() + '_' + selectedFile.name);
    await uploadBytes(storageRef, selectedFile);
    const url = await getDownloadURL(storageRef);
    await addDoc(collection(db, 'gallery'), {
      title, prompt, category, url,
      storagePath: storageRef.fullPath,
      date: new Date().toISOString()
    });
    document.getElementById('imgTitle').value = '';
    document.getElementById('imgPrompt').value = '';
    document.getElementById('imgCategory').value = 'general';
    document.getElementById('previewImg').style.display = 'none';
    selectedFile = null;
    await loadItems();
    showToast('✅ 갤러리에 저장됨!');
  } catch(e) { showToast('❌ 업로드 실패: ' + e.message); }
};

// 데이터 로드
async function loadItems() {
  try {
    const q = query(collection(db, 'gallery'), orderBy('date', 'desc'));
    const snap = await getDocs(q);
    items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderGallery();
  } catch(e) { showToast('❌ 로드 실패'); }
}

// 필터
window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderGallery();
};

// 렌더링
window.renderGallery = function() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = items.filter(it => {
    if (currentFilter !== 'all' && it.category !== currentFilter) return false;
    if (search && !it.title.toLowerCase().includes(search) && !it.prompt.toLowerCase().includes(search)) return false;
    return true;
  });
  const grid = document.getElementById('galleryGrid');
  document.getElementById('galleryCount').textContent = filtered.length + '개';
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🖼️</div><p>아직 이미지가 없어요</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(it => `
    <div class="gallery-card">
      <img src="${it.url}" alt="${escapeHtml(it.title)}" loading="lazy" onclick="openModal('${it.id}')">
      <div class="card-body">
        <div class="card-title">${escapeHtml(it.title)}</div>
        <div class="card-prompt">${escapeHtml(it.prompt || '프롬프트 없음')}</div>
        <div class="card-meta">
          <span class="card-date">${it.date ? new Date(it.date).toLocaleDateString('ko') : ''}</span>
          <span class="card-tag">${CATEGORY_LABELS[it.category] || it.category}</span>
        </div>
        <div class="card-actions">
          <button style="background:#1e3a5f;border:1px solid #3b82f6;color:#93c5fd;" onclick="copyText('${escapeHtml(it.prompt || '')}','복사됨!')">📋</button>
          <button style="background:#1e1b4b;border:1px solid #4c1d95;color:#c4b5fd;" onclick="openModal('${it.id}')">🔍 보기</button>
          <button style="background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5;" onclick="deleteItem('${it.id}','${it.storagePath || ''}')">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
};

// 모달
window.openModal = function(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  currentItemId = id;
  document.getElementById('modalImg').src = it.url;
  document.getElementById('modalTitle').textContent = it.title;
  document.getElementById('modalPrompt').textContent = it.prompt || '프롬프트 없음';
  document.getElementById('modal').classList.add('visible');
};
window.closeModal = function(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('visible');
  }
};
window.deleteCurrentItem = function() {
  if (currentItemId) {
    const it = items.find(i => i.id === currentItemId);
    deleteItem(currentItemId, it?.storagePath || '');
    document.getElementById('modal').classList.remove('visible');
  }
};

// 삭제
window.deleteItem = async function(id, storagePath) {
  if (!confirm('삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db, 'gallery', id));
    if (storagePath) {
      try { await deleteObject(ref(storage, storagePath)); } catch(e) {}
    }
    await loadItems();
    showToast('🗑️ 삭제됨!');
  } catch(e) { showToast('❌ 삭제 실패'); }
};

// 텍스트 복사
window.copyText = function(text, msg) {
  navigator.clipboard.writeText(text).then(() => showToast('📋 ' + msg)).catch(() => showToast('❌ 복사 실패'));
};

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

loadItems();
</script>
</body>
</html>

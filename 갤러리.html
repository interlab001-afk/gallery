<div id="loadingOverlay">
  <div class="licon">⚙️</div>
  <p>갤러리 불러오는 중...</p>
</div>

<header>
  <h1>🎨 프롬프트 갤러리</h1>
  <span id="userInfo">로그인 필요</span>
  <button class="hbtn" id="btnLogin">🔑 Google 로그인</button>
  <button class="hbtn" id="btnLogout">로그아웃</button>
  <button class="hbtn" id="btnAdd">＋ 새 항목 추가</button>
</header>
<div id="apiBar">
  <label>🤖 Gemini API 키:</label>
  <input type="password" id="apiKeyInput" placeholder="API 키 입력...">
  <button class="apibtn" id="btnShowKey" style="background:#2d2b50;color:#a78bfa">👁</button>
  <button class="apibtn" id="btnTestApi">키 확인</button>
  <span id="apiStatus"></span>
</div>
<div id="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 검색...">
  <select id="sortSel">
    <option value="newest">최신순</option>
    <option value="oldest">오래된순</option>
    <option value="name">이름순</option>
  </select>
  <button class="sizebtn" data-sz="sm">S</button>
  <button class="sizebtn active" data-sz="md">M</button>
  <button class="sizebtn" data-sz="lg">L</button>
  <button id="btnFavFilter">⭐ 즐겨찾기</button>
  <span id="countBadge"></span>
</div>
<div id="tagBar"></div>
<div id="gallery" class="sz-md"></div>
<div id="emptyState"><div class="eicon">🖼️</div><p>저장된 항목이 없어요.<br>로그인 후 새 항목을 추가해보세요!</p></div>

<!-- 하단 패널 -->
<div id="modPanel" class="collapsed">
  <div id="modToggleBar">
    <span class="mtitle">⚙️ 프롬프트 수정자</span>
    <div id="selectedCount" style="font-size:.75rem;color:#f472b6;margin-right:4px"></div>
    <button id="btnManageMods">관리</button>

  </div>
  <div id="panelMainTabs">
    <button class="pmtab active" data-panel="mod">⚙️ 수정자</button>
    <button class="pmtab" data-panel="editor">🖊️ 프롬프트 편집기</button>
  </div>
  <div id="modPanelInner">
    <div id="selectedModsBar">
      <span class="smlabel">선택됨:</span>
      <span id="noSelMsg" style="font-size:.72rem;color:#4c4a72">없음 — 아래에서 클릭하여 선택</span>
      <button id="btnClearMods">전체 해제</button>
    </div>
    <div id="geminiOpt">
      <label><input type="checkbox" id="chkGemini"> 🤖 제미니 번역 포함</label>
      <span class="gdesc">※ 카드 클릭 시 원본 프롬프트를 제미니가 번역/보완해서 완성</span>
    </div>
    <div id="modTabs"></div>
    <div id="modButtons"></div>
    <div id="quickAddBar">
      <span class="qalabel">➕ 현재 탭에 추가:</span>
      <div id="qaInputGroup">
        <div class="qaRow">
          <input type="text" id="qaKo" placeholder="한글 이름 입력 (예: 도쿄 야경거리)">
          <button id="btnQaAuto">⚡ 자동변환</button>
        </div>
        <div class="qaRow">
          <input type="text" id="qaEn" placeholder="영문 프롬프트 — 자동생성되거나 직접 입력">
          <button id="btnQuickAdd">➕ 추가</button>
        </div>
        <div id="qaStatus"></div>
      </div>
    </div>
  </div>
  <div id="editorPanelInner">
    <div class="editor-topbar">
      <span class="etitle">🖊️ 프롬프트 편집기</span>
      <span class="einfo" id="editorCharCount">0자</span>
    </div>
    <div class="editor-sep-row">
      <label>구분자:</label>
      <select id="editorSep">
        <option value=", ">쉼표 (,)</option>
        <option value="\n">줄바꿈</option>
        <option value=" ">공백</option>
      </select>
    </div>
    <textarea id="promptEditor" placeholder="여기에 프롬프트를 입력하세요..."></textarea>
    <div class="editor-btnrow">
      <button class="ebtn" id="btnEditorCopy">📋 복사</button>
      <button class="ebtn" id="btnEditorClear">🗑️ 초기화</button>
      <button class="ebtn" id="btnEditorDedup">✂️ 중복제거</button>
      <button class="ebtn" id="btnEditorGemini">🤖 제미니 다듬기</button>

      <label><input type="checkbox" id="chkAutoAppend" checked> 수정자 클릭 시 편집기에 자동 추가</label>

    </div>
  </div>
</div>

<!-- 상세보기 -->
<div class="overlay" id="detailOverlay">
  <div id="detailBox">
    <div id="detailHead">
      <h2 id="detailTitle"></h2>
      <button id="detailFav">⭐</button>
      <button id="detailEdit" style="padding:5px 12px;border:none;border-radius:7px;background:#3730a3;color:#a78bfa;cursor:pointer;font-size:.82rem">✏️ 편집</button>
      <button id="detailDelete" style="padding:5px 12px;border:none;border-radius:7px;background:#7f1d1d;color:#fca5a5;cursor:pointer;font-size:.82rem">🗑️ 삭제</button>
      <button id="detailClose">✕</button>
    </div>
    <div id="detailBody">
      <div id="detailLeft">
        <div id="detailMain"><span style="color:#4c4a72;font-size:2rem">🖼️</span></div>
        <div id="detailThumbs"></div>
      </div>
      <div id="detailRight">
        <div id="finalPromptSection">
          <div class="fplabel">✨ 완성된 프롬프트<span id="modAppliedInfo"></span></div>
          <div id="finalPromptText"></div>
          <div class="detail-action-row">
            <button id="btnCopyFinal">📋 복사</button>
            <button id="btnSendEditor">📤 편집기로</button>
          </div>
        </div>
        <div class="dprompt-orig">
          <div class="dlabel">📝 원본 프롬프트</div>
          <div id="detailOrigPrompt"></div>
        </div>
        <div class="dtags" id="detailTags"></div>
        <div class="dmemo" id="detailMemoWrap" style="display:none">
          <div class="dlabel">📌 메모</div>
          <div id="detailMemo"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 추가/편집 모달 -->
<div class="overlay" id="modalOverlay">
  <div id="modalBox">
    <div id="modalHead">
      <h2 id="modalTitle">새 항목 추가</h2>
      <button id="modalClose">✕</button>
    </div>
    <div id="modalBody">
      <div class="field"><label>제목</label><input type="text" id="mTitle" placeholder="항목 제목 입력..."></div>
      <div class="field"><label>🌐 영문 프롬프트</label><textarea id="mPrompt" placeholder="영문 프롬프트 입력..."></textarea></div>
      <div class="field">
        <label>🤖 한글 → 영문 변환 (제미니)</label>
        <div class="translate-row">
          <textarea id="mKorean" placeholder="한글로 설명 입력..."></textarea>
          <button class="transbtn" id="btnTranslate">변환 ▶</button>
        </div>
        <div id="transResult"></div>
      </div>
      <div class="field">
        <label>🏷️ 태그</label>
        <div class="tag-input-row" id="presetTagRow"></div>
        <input type="text" id="mTagInput" placeholder="태그 직접 입력 후 Enter...">
        <div class="tag-input-row" id="selectedTagRow" style="margin-top:6px"></div>
      </div>
      <div class="field"><label>📌 메모</label><textarea id="mMemo" placeholder="메모 입력..."></textarea></div>
      <div class="field">
        <label>🖼️ 이미지 (여러 장 가능)</label>
        <input type="file" id="mImages" accept="image/*" multiple>
        <div class="img-previews" id="mImgPreviews"></div>
      </div>
      <div class="modal-actions">
        <button class="mbtn mbtn-cancel" id="btnModalCancel">취소</button>
        <button class="mbtn mbtn-save" id="btnModalSave">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 전체화면 -->
<div class="overlay" id="fsOverlay">
  <button id="fsClose">✕</button>
  <button id="fsPrev">‹</button>
  <img id="fsImg" src="" alt="">
  <button id="fsNext">›</button>

// ── Gemini ──
async function callGemini(key, prompt) {
  const res = await fetch(GEMINI_URL(key), {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
  });
  if (!res.ok) throw new Error(`API 오류 ${res.status}`);
  const data = await res.json();
  const result = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  if (!result) throw new Error('응답 없음');
  return result;
}

function getEditor() { return document.getElementById('promptEditor') }
function getSep() { const v = document.getElementById('editorSep').value; return v === '\\n' ? '\n' : v }

function appendToEditor(text) {
  const ed = getEditor();
  const sep = getSep();
  const cur = ed.value.trim();
  ed.value = cur ? cur + sep + text : text;
  updateEditorCount();
  switchPanelTab('editor');
  document.getElementById('modPanel').classList.remove('collapsed');
  toast('📤 편집기에 추가됨', '#059669');
}

function updateEditorCount() {
  const len = getEditor().value.length;
  document.getElementById('editorCharCount').textContent = len + '자';
  document.getElementById('editorCharCount2').textContent = len ? len + '자' : '';
}

function switchPanelTab(tab) {
  activePanelTab = tab;
  document.querySelectorAll('.pmtab').forEach(b => b.classList.toggle('active', b.dataset.panel === tab));
  document.getElementById('modPanelInner').style.display = tab === 'mod' ? 'block' : 'none';
  document.getElementById('editorPanelInner').style.display = tab === 'editor' ? 'flex' : 'none';
}

async function editorGeminiPolish() {
  const ed = getEditor();
  const text = ed.value.trim();
  if (!text) { toast('편집기가 비어있어요', '#f59e0b'); return }
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { toast('API 키를 입력하세요', '#f59e0b'); return }
  const btn = document.getElementById('btnEditorGemini');
  btn.disabled = true; btn.textContent = '⏳ 다듬는 중...';
  try {
    const result = await callGemini(key, `You are an AI image prompt expert. Clean up and optimize the following image prompt.\nRules:\n- Remove duplicate keywords\n- Fix grammar and flow\n- Keep all meaningful keywords\n- English only, comma-separated, concise\n- Do not add new concepts not in the original\n\nPrompt: ${text}\n\nOptimized prompt:`);
    ed.value = result.trim().replace(/^['"\`]|['"\`]$/g, '');
    updateEditorCount();
    toast('✨ 제미니가 다듬었어요!', '#059669');
  } catch(e) { toast('오류: ' + e.message, '#ef4444') }
  finally { btn.disabled = false; btn.textContent = '🤖 제미니 다듬기' }
}

function editorDedup() {
  const ed = getEditor();
  const text = ed.value.trim();
  if (!text) { toast('편집기가 비어있어요', '#f59e0b'); return }
  const sep = getSep();
  const parts = text.split(sep === ',' ? /,\s*/ : sep).map(s => s.trim()).filter(Boolean);
  const seen = new Set();
  const deduped = parts.filter(p => { const k = p.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true });
  ed.value = deduped.join(sep === ',' ? ', ' : sep);
  updateEditorCount();
  toast(`✂️ 중복 ${parts.length - deduped.length}개 제거됨`, '#0284c7');
}

// ── 갤러리 렌더링 ──
function renderGallery() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSel').value;
  let arr = [...items];
  if (q) arr = arr.filter(it => it.title?.toLowerCase().includes(q) || it.prompt?.toLowerCase().includes(q) || it.tags?.some(t => t.toLowerCase().includes(q)));
  if (activeTagFilter) arr = arr.filter(it => it.tags?.includes(activeTagFilter));
  if (favFilter) arr = arr.filter(it => it.fav);
  if (sort === 'newest') arr.sort((a,b) => b.ts - a.ts);
  else if (sort === 'oldest') arr.sort((a,b) => a.ts - b.ts);
  else arr.sort((a,b) => a.title?.localeCompare(b.title));
  filteredItems = arr;
  document.getElementById('countBadge').textContent = arr.length + '개';
  const g = document.getElementById('gallery');
  const empty = document.getElementById('emptyState');
  g.innerHTML = '';
  if (!arr.length) { empty.style.display = 'flex'; g.style.display = 'none'; return }
  empty.style.display = 'none'; g.style.display = 'grid';
  arr.forEach((it, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    const thumbSrc = it.imageUrls?.[0] || '';
    const thumbHTML = thumbSrc ? `<img class="card-thumb" src="${thumbSrc}" alt="" loading="lazy">` : `<div class="card-thumb-empty">🖼️</div>`;
    const tagsHTML = (it.tags || []).slice(0,3).map(t => `<span class="card-tag">${escHtml(t)}</span>`).join('');
    card.innerHTML = `
      ${thumbHTML}
      <div class="card-body">
        <div class="card-num">#${String(idx+1).padStart(3,'0')}</div>
        <div class="card-title">${escHtml(it.title || '제목없음')}</div>
        <div class="card-prompt">${escHtml(it.prompt || '')}</div>
        <div class="card-tags">${tagsHTML}</div>
        <div class="card-footer">
          <span class="card-imgcount">🖼️ ${(it.imageFiles || []).length}장</span>
          <div style="display:flex;gap:4px;align-items:center">
            <button class="card-send" data-id="${it.id}" title="편집기로 보내기">📤</button>
            <button class="card-fav ${it.fav ? 'on' : ''}" data-id="${it.id}">${it.fav ? '⭐' : '☆'}</button>
          </div>
        </div>
      </div>`;
    card.addEventListener('click', e => { if (e.target.classList.contains('card-fav') || e.target.classList.contains('card-send')) return; openDetail(it.id) });
    card.querySelector('.card-fav').addEventListener('click', e => { e.stopPropagation(); toggleFav(it.id) });
    card.querySelector('.card-send').addEventListener('click', e => { e.stopPropagation(); appendToEditor(it.prompt || it.title || '') });
    g.appendChild(card);
  });
  rebuildTagBar();
}

function rebuildTagBar() {
  const all = new Set();
  items.forEach(it => (it.tags || []).forEach(t => all.add(t)));
  const bar = document.getElementById('tagBar');
  bar.innerHTML = '';
  if (!all.size) return;
  const allChip = document.createElement('span');
  allChip.className = 'tagChip' + (activeTagFilter === null ? ' active' : '');
  allChip.textContent = '전체';
  allChip.onclick = () => { activeTagFilter = null; renderGallery() };
  bar.appendChild(allChip);
  all.forEach(t => {
    const c = document.createElement('span');
    c.className = 'tagChip' + (activeTagFilter === t ? ' active' : '');
    c.textContent = t;
    c.onclick = () => { activeTagFilter = activeTagFilter === t ? null : t; renderGallery() };
    bar.appendChild(c);
  });
}

async function buildFinalPrompt(it) {
  const finalEl = document.getElementById('finalPromptText');
  const infoEl = document.getElementById('modAppliedInfo');
  const origPrompt = it.prompt || '';
  if (!selectedMods.length && !document.getElementById('chkGemini').checked) {
    finalEl.textContent = origPrompt; infoEl.textContent = '(수정자 미적용)'; return;
  }
  let base = origPrompt;
  if (document.getElementById('chkGemini').checked) {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { toast('API 키를 입력하세요', '#f59e0b'); finalEl.textContent = origPrompt; return }
    finalEl.textContent = '🤖 제미니가 번역/보완 중...';
    try {
      base = (await callGemini(key, `You are an AI image prompt expert. Take this existing English image prompt and enhance it to be more vivid and creative. Keep the same theme but make it more descriptive. English only, no explanations, 1-3 sentences max.\n\nOriginal prompt: ${origPrompt}\n\nEnhanced prompt:`)).trim();
    } catch(e) { toast('제미니 오류: ' + e.message, '#ef4444'); base = origPrompt }
  }
  if (selectedMods.length) {
    base = base + (base ? ', ' : '') + selectedMods.map(m => m.en).join(', ');
    infoEl.textContent = `수정자 ${selectedMods.length}개 적용됨`;
  } else {
    infoEl.textContent = '제미니 보완됨';
  }
  finalEl.textContent = base;
}

function renderModPanel() {
  const tabsEl = document.getElementById('modTabs');
  tabsEl.innerHTML = '';
  MODIFIERS.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'modtab' + (i === activeCatIdx ? ' active' : '');
    btn.textContent = cat.cat;
    btn.addEventListener('click', () => { activeCatIdx = i; renderModPanel() });
    tabsEl.appendChild(btn);
  });
  const btnsEl = document.getElementById('modButtons');
  btnsEl.innerHTML = '';
  (MODIFIERS[activeCatIdx]?.items || []).forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'modbtn' + (selectedMods.find(m => m.en === item.en) ? ' selected' : '');
    btn.textContent = item.ko;
    btn.title = item.en;
    btn.addEventListener('click', () => {
      toggleMod(item);
      if (document.getElementById('chkAutoAppend').checked && activePanelTab === 'editor') appendToEditor(item.en);
    });
    btnsEl.appendChild(btn);
  });
  renderSelectedMods();
}

function toggleMod(item) {
  const idx = selectedMods.findIndex(m => m.en === item.en);
  if (idx >= 0) selectedMods.splice(idx, 1);
  else selectedMods.push(item);
  document.getElementById('selectedCount').textContent = selectedMods.length ? `${selectedMods.length}개 선택됨` : '';
  renderModPanel();
}

function renderSelectedMods() {
  const bar = document.getElementById('selectedModsBar');
  bar.querySelectorAll('.smchip').forEach(el => el.remove());
  const noMsg = document.getElementById('noSelMsg');
  if (!selectedMods.length) { noMsg.style.display = ''; return }
  noMsg.style.display = 'none';
  selectedMods.forEach(m => {
    const chip = document.createElement('span');
    chip.className = 'smchip';
    chip.innerHTML = `${escHtml(m.ko)}<span class="rmx">×</span>`;
    chip.querySelector('.rmx').addEventListener('click', () => {
      selectedMods = selectedMods.filter(x => x.en !== m.en);
      document.getElementById('selectedCount').textContent = selectedMods.length ? `${selectedMods.length}개 선택됨` : '';
      renderModPanel();
    });
    bar.insertBefore(chip, document.getElementById('btnClearMods'));
  });
}

function setQaStatus(msg, cls='') { const el = document.getElementById('qaStatus'); el.textContent = msg; el.className = cls }

async function quickAutoTranslate() {

  btn.disabled = true; btn.textContent = '⏳ 변환중...';
  setQaStatus('🤖 변환 중...', 'ing');
  try {
    const result = await callGemini(key, `Convert the following Korean modifier name into a concise English image prompt keyword.\nEnglish only, 3-10 words, no explanations.\n\nKorean: "${ko}"\n\nEnglish:`);
    const cleaned = result.trim().replace(/^['"\`]|['"\`]$/g, '').replace(/\n/g, ' ').trim();
    document.getElementById('qaEn').value = cleaned;
    document.getElementById('qaEn').classList.add('filled');

function quickAddMod() {
  const ko = document.getElementById('qaKo').value.trim();

function openAddModal(id = null) {
  if (!currentUser) { toast('먼저 로그인하세요', '#f59e0b'); return }
  editId = id; modalImgs = [];
  const it = id ? items.find(i => i.id === id) : null;
  document.getElementById('modalTitle').textContent = id ? '항목 편집' : '새 항목 추가';
  document.getElementById('mTitle').value = it?.title || '';
  document.getElementById('mPrompt').value = it?.prompt || '';
  document.getElementById('mMemo').value = it?.memo || '';
  document.getElementById('mKorean').value = '';
  document.getElementById('transResult').style.display = 'none';
  const selTags = [...(it?.tags || [])];
  const presetRow = document.getElementById('presetTagRow');
  presetRow.innerHTML = '';
  PRESET_TAGS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'preset-tag' + (selTags.includes(t) ? ' sel' : '');
    btn.textContent = t;
    btn.onclick = () => { btn.classList.toggle('sel'); const i = selTags.indexOf(t); if (i >= 0) selTags.splice(i, 1); else selTags.push(t); renderSelTags(selTags) };
    presetRow.appendChild(btn);
  });
  renderSelTags(selTags);
  const tagInput = document.getElementById('mTagInput');
  tagInput.value = '';
  tagInput.onkeydown = e => { if (e.key === 'Enter' && tagInput.value.trim()) { const t = tagInput.value.trim(); if (!selTags.includes(t)) selTags.push(t); tagInput.value = ''; renderSelTags(selTags) } };
  if (it?.imageUrls) modalImgs = it.imageUrls.map((url, i) => ({ dataURL: url, name: it.imageFiles?.[i] || uid() + '.jpg', existing: true, isUrl: true }));
  renderModalImgPreviews();
  document.getElementById('mImages').value = '';
  document.getElementById('mImages').onchange = async e => {
    for (const f of e.target.files) { const du = await fileToDataURL(f); modalImgs.push({ dataURL: du, name: uid() + '.' + getExt(du), existing: false, isUrl: false }) }
    renderModalImgPreviews();
  };
  document.getElementById('modalOverlay').classList.add('open');
}

function renderSelTags(selTags) {
  const row = document.getElementById('selectedTagRow');
  row.innerHTML = '';
  selTags.forEach((t, i) => {
    const chip = document.createElement('span');
    chip.className = 'smchip';
    chip.innerHTML = `${escHtml(t)}<span class="rmx">×</span>`;
    chip.querySelector('.rmx').addEventListener('click', () => { selTags.splice(i, 1); renderSelTags(selTags); document.querySelectorAll('.preset-tag').forEach(btn => { if (btn.textContent === t) btn.classList.remove('sel') }) });
    row.appendChild(chip);
  });
  row._tags = selTags;
}

function renderModalImgPreviews() {
  const el = document.getElementById('mImgPreviews');
  el.innerHTML = '';
  modalImgs.forEach((img, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'img-prev-wrap';
    wrap.innerHTML = `<img src="${img.dataURL}" alt=""><button class="img-prev-rm">×</button>`;
    wrap.querySelector('.img-prev-rm').addEventListener('click', () => { modalImgs.splice(i, 1); renderModalImgPreviews() });
    el.appendChild(wrap);
  });
}

async function saveItem() {
  if (!currentUser) { toast('로그인이 필요합니다', '#ef4444'); return }
  const title = document.getElementById('mTitle').value.trim();
  const prompt = document.getElementById('mPrompt').value.trim();
  const memo = document.getElementById('mMemo').value.trim();
  const tags = [...(document.getElementById('selectedTagRow')._tags || [])];
  if (!title) { toast('제목을 입력하세요', '#f59e0b'); return }
  toast('💾 저장 중...', '#6d28d9');
  const imageFiles = [];
  const imageUrls = [];
  for (const img of modalImgs) {
    if (img.isUrl) {
      imageFiles.push(img.name);
      imageUrls.push(img.dataURL);
    } else {
      const url = await uploadImageToStorage(img.dataURL, img.name);
      imageFiles.push(img.name);
      imageUrls.push(url);
    }
  }
  const itemData = { title, prompt, memo, tags, imageFiles, imageUrls, fav: false, ts: Date.now() };
  if (editId) {
    const it = items.find(i => i.id === editId);
    if (it) {
      const removed = (it.imageFiles || []).filter(fn => !imageFiles.includes(fn));
      for (const fn of removed) await deleteImageFromStorage(fn);
      Object.assign(it, { title, prompt, memo, tags, imageFiles, imageUrls });
      await saveItemToFirebase(it);
    }
  } else {
    const newItem = { id: uid(), ...itemData };
    items.unshift(newItem);
    await saveItemToFirebase(newItem);
  }
  renderGallery();
  document.getElementById('modalOverlay').classList.remove('open');
  toast(editId ? '✏️ 수정 완료!' : '✅ 저장 완료!', '#059669');
  editId = null;
}

async function deleteItem(id) {
  if (!confirm('이 항목을 삭제할까요?')) return;
  const it = items.find(i => i.id === id);
  if (it) for (const fn of (it.imageFiles || [])) await deleteImageFromStorage(fn);
  await deleteItemFromFirebase(id);
  items = items.filter(i => i.id !== id);
  renderGallery();
  toast('🗑️ 삭제됨', '#ef4444');
  document.getElementById('detailOverlay').classList.remove('open');
}

  document.getElementById('detailDelete').addEventListener('click', () => deleteItem(currentDetailId));
  document.getElementById('detailOverlay').addEventListener('click', e => { if (e.target === document.getElementById('detailOverlay')) { document.getElementById('detailOverlay').classList.remove('open'); currentDetailId = null } });
  document.getElementById('detailFav').addEventListener('click', () => { if (currentDetailId) toggleFav(currentDetailId) });
  document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));
  document.getElementById('btnModalCancel').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));
  document.getElementById('btnModalSave').addEventListener('click', saveItem);
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open') });
  document.getElementById('btnTranslate').addEventListener('click', translateKorean);
  document.getElementById('fsClose').addEventListener('click', () => document.getElementById('fsOverlay').classList.remove('open'));
  document.getElementById('fsPrev').addEventListener('click', () => fsMove(-1));
  document.getElementById('fsNext').addEventListener('click', () => fsMove(1));
  document.getElementById('fsOverlay').addEventListener('click', e => { if (e.target === document.getElementById('fsOverlay')) document.getElementById('fsOverlay').classList.remove('open') });
  document.getElementById('manageClose').addEventListener('click', () => document.getElementById('manageOverlay').classList.remove('open'));
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') ['fsOverlay','detailOverlay','modalOverlay','manageOverlay'].forEach(id => document.getElementById(id).classList.remove('open'));
    if (document.getElementById('fsOverlay').classList.contains('open')) { if (e.key === 'ArrowLeft') fsMove(-1); if (e.key === 'ArrowRight') fsMove(1) }
  });

  switchPanelTab('mod');
  renderModPanel();
  updateEditorCount();
});
</script>
</body>
</html>
